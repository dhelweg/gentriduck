version: 2

models:
  - name: stg_thesis_2018_result_bzr
    description: >
      Staging view over the 2018 thesis golden CSV at BZR (Bezirksregion) level.
      Strips the 'r.' column prefix, casts key columns, translates German data values to
      English at the staging boundary, and adds city_code='BER' and area_level='bzr'.
      Key columns only -- the full 1722-column source is not carried forward.
      ODbL-licensed; see reference/goldens/ODbL_LICENCE.
      Area names (raum_desc) are Berlin proper nouns and are kept in German.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: BZR area code (string; e.g. '010111').
        tests:
          - not_null
      - name: raum_desc
        description: BZR area name (German proper noun; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM (e.g. 201612).
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER' for this staging model.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'bzr' for this staging model.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: status_class_bi
        description: >
          Projected status class (binary English label).
          high = low deprivation / high POI status score (was 'niedrig' in the 2018 thesis).
          low = high deprivation / low POI status score (was 'hoch' in the 2018 thesis).
          See B5-findings-check.md for the label polarity explanation.
        tests:
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
      - name: dynamism_class_bi
        description: >
          Projected dynamism class (binary English label).
          positive = high gentrification pressure / above-average POI churn (was 'positiv').
          negative = low gentrification pressure / below-average POI churn (was 'negativ').
          See B5-findings-check.md for the label polarity explanation.
        tests:
          - accepted_values:
              arguments:
                values: ["positive", "neutral", "negative"]

  - name: stg_thesis_2018_result_plr
    description: >
      Staging view over the 2018 thesis golden CSV at PLR (Planungsraum) level.
      Same structure as stg_thesis_2018_result_bzr; area_level='plr'.
      436 rows. ODbL-licensed.
      Area names are Berlin proper nouns and are kept in German.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: PLR area code (string).
        tests:
          - not_null
      - name: raum_desc
        description: PLR area name (German proper noun; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM.
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'plr'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: status_class_bi
        description: Projected status class (binary English label; high/medium/low).
        tests:
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
      - name: dynamism_class_bi
        description: Projected dynamism class (binary English label; positive/neutral/negative).
        tests:
          - accepted_values:
              arguments:
                values: ["positive", "neutral", "negative"]

  - name: stg_thesis_2018_result_plr_distcalc
    description: >
      Staging view over the 2018 thesis golden CSV at PLR level using
      distance-weighted POI features (the Java UDF variant). 436 rows.
      area_level='plr', is_distance_weighted=true.
      In Gentriduck the distance-weighted variant will be reproduced via DuckDB
      ST_Distance / ST_DWithin (Epic B3/C); for now this staging model surfaces
      the golden output as the reference for that variant.
      ODbL-licensed. Area names are Berlin proper nouns and are kept in German.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: PLR area code (string).
        tests:
          - not_null
      - name: raum_desc
        description: PLR area name (German proper noun; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM.
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'plr'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: is_distance_weighted
        description: >
          Flag indicating that POI features were distance-weighted in this variant.
          Always true for this staging model.
        tests:
          - not_null

  # --- C1: OSM POI history (real model; data populated by ingestion script) ---

  - name: stg_osm_poi
    description: >
      Staging view over annual OSM POI GeoParquet snapshots for Berlin.
      Produced by ingestion/berlin/osm/ingest_osm_history.py (ADR-0002, Option B):
      Geofabrik Germany full-history .osh.pbf processed with the osmium Python package
      (BSL-1.0) -> one parquet per year under data/raw/osm/berlin/<year>.parquet
      (gitignored per ADR-0008). Each row is one OSM node feature visible at
      YYYY-01-01T00:00:00Z within the Berlin bounding box, matched to the poi_mapping
      tag set. ODbL-licensed; source_attribution column carries the attribution string.
      Returns zero rows (typed stub) when no parquet files have been ingested yet,
      so downstream models and dbt build pass before data download.
      Nodes only (C1 scope): way/relation POIs deferred to C2 tag-drift work.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - snapshot_year
              - osm_id
          config:
            where: "osm_id is not null"
    columns:
      - name: city_code
        description: >
          City identifier; always 'berlin' for this adapter (ADR-0005).
          Note: Epic B thesis models use 'BER'; this model uses lowercase 'berlin'
          per the ingestion convention (normalized at the staging boundary).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
          - accepted_values:
              arguments:
                values: ["berlin"]
              config:
                where: "osm_id is not null"
      - name: snapshot_year
        description: >
          Calendar year of the snapshot (integer). Features visible at
          YYYY-01-01T00:00:00Z. Range: 2008-present. 2018 is included for
          directional comparison with the Epic B thesis outputs.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: osm_id
        description: >
          OSM feature identifier in 'node/<id>' form.
          Unique within a (snapshot_year, osm_id) combination (tested at model level).
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: poi_domain
        description: >
          Top-level POI domain from seed_poi_mapping.csv (e.g. 'Gastronomy',
          'Retail', 'Public Service'). Assigned by the ingestion OSM tag mapping.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_category
        description: >
          Mid-level POI category from seed_poi_mapping.csv (e.g. 'Restaurant',
          'Clothing', 'Health'). Assigned by the ingestion OSM tag mapping.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_type
        description: >
          Specific POI type from seed_poi_mapping.csv (e.g. 'Other Restaurant',
          'Bakery', 'Dentist'). Assigned by the ingestion OSM tag mapping.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: lon
        description: WGS-84 longitude of the OSM node (decimal degrees).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: lat
        description: WGS-84 latitude of the OSM node (decimal degrees).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: source_attribution
        description: >
          ODbL attribution string (mandatory per OSM licence). Value:
          "OSM via Geofabrik full-history .osh.pbf / ODbL -- https://www.openstreetmap.org/copyright"
        tests:
          - not_null:
              config:
                where: "osm_id is not null"

  # --- Stubs (no tests -- zero rows; populated by later epics) ---

  - name: stg_berlin_lor
    description: >
      STUB -- zero rows until Epic C LOR geometry ingestion lands.
      See ADR-0003 (Berlin geographies). When populated, each row represents one
      LOR area polygon at a given vintage (pre-2021 or LOR 2021), conformed to the
      city-agnostic area_level vocabulary (bezirk/bzr/plr).
      Source: gdi.berlin.de WFS (CC BY 3.0 DE).
      Ingestion adapter: ingestion/berlin/geographies/ (not yet implemented).
    meta:
      dbt_meta_owner: data-engineer

  - name: stg_berlin_ewr
    description: >
      Staging view over annual EWR (Einwohnerregister) Parquet snapshots for Berlin.
      Produced by ingestion/berlin/ewr/ingest_ewr.py (ADR-0003, EWR section):
      "Einwohnerinnen und Einwohner in Berlin in LOR-Planungsraeumen am 31.12.YYYY"
      published by Amt fuer Statistik Berlin-Brandenburg (CC BY 3.0 DE) on
      daten.berlin.de. One parquet per year under data/raw/berlin/ewr/<year>.parquet
      (gitignored per ADR-0008). Each row is one indicator value for one PLR area
      at one 31-Dec reference date. Long format: 13 indicators x ~542 PLR areas
      x number of ingested years. source_attribution column carries the CC BY
      attribution string.
      Returns zero rows (typed stub) when no parquet files have been ingested yet,
      so downstream models and dbt build pass before data download.
      See seed_ewr_indicator_meta for indicator definitions and caveats.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - area_code
              - indicator
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "indicator_value between 0 and 1"
          config:
            where: "area_code is not null and indicator not in ('residents_total', 'mean_age_years') and indicator_value is not null"
    columns:
      - name: city_code
        description: >
          City identifier; always 'berlin' for this adapter (ADR-0005).
          Lowercase, matching the C1 ingestion convention.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["berlin"]
              config:
                where: "area_code is not null"
      - name: area_code
        description: >
          PLR (Planungsraum) identifier, zero-padded to 8 characters.
          Matches the LOR area code scheme used in dim_area.
        tests:
          - not_null:
              config:
                where: "reference_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage for this area code.
          'lor_pre2021': pre-2021 LOR layout (reference_year <= 2020).
          'lor_2021': LOR 2021 reform layout (reference_year >= 2021).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: reference_year
        description: >
          Calendar year of the 31-December snapshot (integer). Range: 2008-2024.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: reference_date
        description: >
          The 31-December snapshot date as a DATE (e.g. 2018-12-31).
          Always the last day of reference_year.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: indicator
        description: >
          Indicator key from the approved 13-indicator set (see seed_ewr_indicator_meta).
          One of: residents_total, residents_male_share, residents_female_share,
          age_under18_share, age_18_27_share, age_27_45_share, age_45_65_share,
          age_65plus_share, mean_age_years, foreigners_share,
          migration_background_share, residence_duration_5y_share,
          residence_duration_10y_share.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values:
                  - residents_total
                  - residents_male_share
                  - residents_female_share
                  - age_under18_share
                  - age_18_27_share
                  - age_27_45_share
                  - age_45_65_share
                  - age_65plus_share
                  - mean_age_years
                  - foreigners_share
                  - migration_background_share
                  - residence_duration_5y_share
                  - residence_duration_10y_share
              config:
                where: "area_code is not null"
      - name: indicator_value
        description: >
          Computed indicator value. Shares are in [0, 1]; residents_total is a
          count; mean_age_years is in decimal years. May be NULL for migration_
          background_share when the source column is absent in a given year, or
          NULL when is_suppressed_any is True (suppressed cells are never coerced
          to 0).
      - name: is_suppressed_any
        description: >
          Boolean flag: True when any numeric indicator cell for this PLR row was
          privacy-suppressed in the source EWR CSV (values '-', '.', blank, or
          similar sentinels). When True, one or more indicator_value fields for
          this PLR x year combination may be NULL. Never coerced to False or 0.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: source_attribution
        description: >
          CC BY 3.0 DE attribution string (mandatory per licence). Value:
          "Amt fuer Statistik Berlin-Brandenburg / Einwohnerregister
          Berlin-Brandenburg (EWR), CC BY 3.0 DE --
          https://www.statistik-berlin-brandenburg.de/"
        tests:
          - not_null:
              config:
                where: "area_code is not null"
