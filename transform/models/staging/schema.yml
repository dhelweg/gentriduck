version: 2

models:
  - name: stg_thesis_2018_result_bzr
    description: >
      Staging view over the 2018 thesis golden CSV at BZR (Bezirksregion) level.
      Strips the 'r.' column prefix, casts key columns, translates German data values to
      English at the staging boundary, and adds city_code='BER' and area_level='bzr'.
      Key columns only -- the full 1722-column source is not carried forward.
      ODbL-licensed; see reference/goldens/ODbL_LICENCE.
      Area names (raum_desc) are Berlin proper nouns and are kept in German.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: BZR area code (string; e.g. '010111').
        tests:
          - not_null
      - name: raum_desc
        description: BZR area name (German proper noun; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM (e.g. 201612).
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER' for this staging model.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'bzr' for this staging model.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: status_class_bi
        description: >
          Projected status class (binary English label).
          high = low deprivation / high POI status score (was 'niedrig' in the 2018 thesis).
          low = high deprivation / low POI status score (was 'hoch' in the 2018 thesis).
          See B5-findings-check.md for the label polarity explanation.
        tests:
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
      - name: dynamism_class_bi
        description: >
          Projected dynamism class (binary English label).
          positive = high gentrification pressure / above-average POI churn (was 'positiv').
          negative = low gentrification pressure / below-average POI churn (was 'negativ').
          See B5-findings-check.md for the label polarity explanation.
        tests:
          - accepted_values:
              arguments:
                values: ["positive", "neutral", "negative"]

  - name: stg_thesis_2018_result_plr
    description: >
      Staging view over the 2018 thesis golden CSV at PLR (Planungsraum) level.
      Same structure as stg_thesis_2018_result_bzr; area_level='plr'.
      436 rows. ODbL-licensed.
      Area names are Berlin proper nouns and are kept in German.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: PLR area code (string).
        tests:
          - not_null
      - name: raum_desc
        description: PLR area name (German proper noun; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM.
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'plr'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: status_class_bi
        description: Projected status class (binary English label; high/medium/low).
        tests:
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
      - name: dynamism_class_bi
        description: Projected dynamism class (binary English label; positive/neutral/negative).
        tests:
          - accepted_values:
              arguments:
                values: ["positive", "neutral", "negative"]

  - name: stg_thesis_2018_result_plr_distcalc
    description: >
      Staging view over the 2018 thesis golden CSV at PLR level using
      distance-weighted POI features (the Java UDF variant). 436 rows.
      area_level='plr', is_distance_weighted=true.
      In Gentriduck the distance-weighted variant will be reproduced via DuckDB
      ST_Distance / ST_DWithin (Epic B3/C); for now this staging model surfaces
      the golden output as the reference for that variant.
      ODbL-licensed. Area names are Berlin proper nouns and are kept in German.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: PLR area code (string).
        tests:
          - not_null
      - name: raum_desc
        description: PLR area name (German proper noun; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM.
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'plr'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: is_distance_weighted
        description: >
          Flag indicating that POI features were distance-weighted in this variant.
          Always true for this staging model.
        tests:
          - not_null

  # --- C1: OSM POI history (real model; data populated by ingestion script) ---

  - name: stg_osm_poi
    description: >
      Staging view over annual OSM POI GeoParquet snapshots for Berlin.
      Produced by ingestion/berlin/osm/ingest_osm_history.py (ADR-0002, Option B):
      Geofabrik Germany full-history .osh.pbf processed with the osmium Python package
      (BSL-1.0) -> one parquet per year under data/raw/osm/berlin/<year>.parquet
      (gitignored per ADR-0008). Each row is one OSM node feature visible at
      YYYY-01-01T00:00:00Z within the Berlin bounding box, matched to the poi_mapping
      tag set. ODbL-licensed; source_attribution column carries the attribution string.
      Returns zero rows (typed stub) when no parquet files have been ingested yet,
      so downstream models and dbt build pass before data download.
      Nodes only (C1 scope): way/relation POIs deferred to C2 tag-drift work.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - snapshot_year
              - osm_id
          config:
            where: "osm_id is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md):
      - assert_not_empty:
          config:
            severity: error
      - assert_min_rows:
          arguments:
            min_rows: 5000
          config:
            severity: warn
    columns:
      - name: city_code
        description: >
          City identifier. Berlin rows use lowercase 'berlin' (legacy
          ingestion convention, predates ADR-0005 canonicalization; Epic B
          thesis models use 'BER' instead -- see int_osm_poi_plr for the
          Berlin-side reconciliation). Hamburg rows (#40 H1, ADR-0014) use
          the canonical 'HH' (matches dim_city.city_code) since this is a
          fresh adapter with no legacy convention to preserve.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
          - accepted_values:
              arguments:
                values: ["berlin", "HH"]
              config:
                where: "osm_id is not null"
      - name: snapshot_year
        description: >
          Calendar year of the snapshot (integer). Features visible at
          YYYY-01-01T00:00:00Z. Range: 2008-present. 2018 is included for
          directional comparison with the Epic B thesis outputs.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: osm_id
        description: >
          OSM feature identifier in 'node/<id>' form.
          Unique within a (snapshot_year, osm_id) combination (tested at model level).
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: poi_domain
        description: >
          Top-level POI domain from seed_poi_mapping.csv (e.g. 'Gastronomy',
          'Retail', 'Public Service'). Assigned by the ingestion OSM tag mapping.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_category
        description: >
          Mid-level POI category from seed_poi_mapping.csv (e.g. 'Restaurant',
          'Clothing', 'Health'). Assigned by the ingestion OSM tag mapping.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_type
        description: >
          Specific POI type from seed_poi_mapping.csv (e.g. 'Other Restaurant',
          'Bakery', 'Dentist'). Assigned by the ingestion OSM tag mapping.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: lon
        description: WGS-84 longitude of the OSM node (decimal degrees).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: lat
        description: WGS-84 latitude of the OSM node (decimal degrees).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: source_attribution
        description: >
          ODbL attribution string (mandatory per OSM licence). Value:
          "OSM via Geofabrik full-history .osh.pbf / ODbL -- https://www.openstreetmap.org/copyright"
        tests:
          - not_null:
              config:
                where: "osm_id is not null"

  # --- Stubs (no tests -- zero rows; populated by later epics) ---

  - name: stg_berlin_lor
    description: >
      Staging view over LOR PLR geometry parquets for Berlin (C3-geo).
      Source: GDI Berlin OGC WFS, CC BY 3.0 DE.
        Pre-2021: https://gdi.berlin.de/services/wfs/lor_2019 (448 PLRs, lor_pre2021)
        LOR 2021:  https://gdi.berlin.de/services/wfs/lor_2021 (542 PLRs, lor_2021)
      Ingestion adapter: ingestion/berlin/lor/ingest_lor_geometries.py.
      Storage: data/raw/berlin/lor/pre2021.parquet + lor_2021.parquet (gitignored).
      Returns zero rows (typed stub) when no parquets have been ingested.
    meta:
      dbt_meta_owner: data-engineer
    # Data-presence gate (docs/lessons/local-first-data-presence.md):
    tests:
      - assert_not_empty:
          config:
            severity: error
      - assert_min_rows:
          arguments:
            min_rows: 400
          config:
            severity: warn

  - name: stg_hamburg_geo
    description: >
      Staging view over Hamburg geometry parquets (statistische Gebiete,
      Stadtteile, Bezirke) — first slice of H1 second-city onboarding (#40,
      ADR-0014 Pillar 4). Source: LGV Hamburg WFS (geodienste.hamburg.de),
      dl-de/by-2.0 (attribution required):
        Statistische Gebiete: https://geodienste.hamburg.de/HH_WFS_Statistische_Gebiete
          (app:statistische_gebiete, ~945 features, 'current' vintage)
        Stadtteile + Bezirke: https://geodienste.hamburg.de/HH_WFS_Verwaltungsgrenzen
          (app:stadtteile ~104, app:bezirke 7)
      Ingestion adapter: ingestion/hamburg/geo/ingest_hamburg_geo.py.
      Storage: data/raw/hamburg/geo/{statgebiet,stadtteil,bezirk}.parquet (gitignored).
      Native CRS EPSG:25832 (NOT Berlin's 25833 — see dim_city.native_crs_epsg,
      the first real exercise of the ADR-0005 per-city CRS parameter).
      Returns zero rows (typed stub) when no parquets have been ingested.
    meta:
      dbt_meta_owner: data-engineer
    # Data-presence gate (docs/lessons/local-first-data-presence.md):
    tests:
      - assert_not_empty:
          config:
            severity: error
      - assert_min_rows:
          arguments:
            min_rows: 1000
          config:
            severity: warn
    columns:
      - name: city_code
        description: Canonical city code 'HH' (ADR-0005; matches dim_city.city_code).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["HH"]
      - name: area_vintage
        description: >
          WFS edition tag. 'current' for this first slice (live edition at
          ingestion time). A historical statistische-Gebiete vintage crosswalk
          (943 vs 941, ADR-0014 open question #2) is deferred.
        tests:
          - not_null
      - name: area_level
        description: >
          Generic dim_area level per ADR-0014's mapping table: 'district'
          (Bezirk, 7), 'subarea_l1' (Stadtteil, ~104), 'subarea_l2'
          (statistisches Gebiet, ~945 — Hamburg's PLR analogue).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["district", "subarea_l1", "subarea_l2"]
      - name: area_code
        description: >
          Natural key per layer: bezirk code (Bezirk), stadtteil_schluessel
          (Stadtteil), statgebiet (statistisches Gebiet).
        tests:
          - not_null
      - name: area_name
        description: >
          Human-readable name. Empty string for statistisches-Gebiet rows
          (the source WFS does not publish a name field for this layer).
      - name: parent_area_code
        description: Bezirk code for Stadtteil rows; null for Bezirk/statistisches-Gebiet rows.
      - name: geometry_wkb
        description: Geometry in WKB, native CRS EPSG:25832 (not reprojected).
        tests:
          - not_null
      - name: source_attribution
        description: Mandatory dl-de/by-2.0 attribution string (ADR-0014).
        tests:
          - not_null

  - name: stg_hamburg_sozialmonitoring
    description: >
      Staging view over the Hamburg Sozialmonitoring parquet — ADR-0014 Pillar 2,
      direct conceptual analogue of stg_berlin_mss (ADR-0006). Source: LGV Hamburg
      WFS (geodienste.hamburg.de/wfs_sozialmonitoring, feature type
      de.hh.up:sozialmonitoring), dl-de/by-2.0 (attribution required). One row per
      (edition, statistisches Gebiet); editions annual 2013-2025 (NOT biennial like
      Berlin's MSS). This is the **outcome / ground-truth** variable for R-A1-style
      re-grounding — never a predictor (mirrors ADR-0006 decision 6). Ingestion
      adapter: ingestion/hamburg/sozialmonitoring/ingest_hamburg_sozialmonitoring.py.
      Storage: data/raw/hamburg/sozialmonitoring/sozialmonitoring.parquet (gitignored).
      status_index/dynamik_index are Hamburg's own text-coded ordinal labels
      ('hoch'|'mittel'|'niedrig'|'sehr niedrig' / 'positiv'|'stabil'|'negativ'),
      deliberately NOT remapped to Berlin's numeric 1-4/1-3 scale at this layer —
      any ordinal-to-numeric cross-city encoding is a methodology decision (R-C1)
      for a downstream int_*-equivalent model. Hamburg's Dynamik is a 3-year change
      window vs Berlin's 2-year (ADR-0014 non-equivalence note) — Dynamik magnitude
      is not directly comparable across cities without accounting for this.
      Returns zero rows (typed stub) when no parquet has been ingested.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - edition
              - area_code
          config:
            where: "area_code is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md):
      # status_index is the outcome variable for Hamburg's re-grounded index —
      # an empty Sozialmonitoring source means the outcome is hollow.
      - assert_not_empty:
          config:
            severity: error
      - assert_min_rows:
          arguments:
            min_rows: 8000
          config:
            severity: warn
    columns:
      - name: city_code
        description: Canonical city code 'HH' (ADR-0005; matches dim_city.city_code).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["HH"]
              config:
                where: "area_code is not null"
      - name: edition
        description: Sozialmonitoring publication year ('jahr'), annual 2013-2025.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: >
          statistisches-Gebiet id ('statgeb'). Joins to stg_hamburg_geo.area_code
          where area_level='subarea_l2'.
        tests:
          - not_null
      - name: stadtteil_name
        description: Informational Stadtteil name from the source; NOT a join key.
      - name: population
        description: >
          'bevoelkerung' — residents in the statistisches Gebiet. The source's own
          >300-residents scoring threshold is already applied upstream; gebiete
          below it are absent for that year, not present-with-nulls.
      - name: status_index
        description: >
          Sozialmonitoring Status-Index text label: 'hoch'|'mittel'|'niedrig'|
          'sehr niedrig'. Source's own ordinal coding, not remapped to numbers here.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["hoch", "mittel", "niedrig", "sehr niedrig"]
              config:
                where: "status_index is not null"
      - name: dynamik_index
        description: >
          Sozialmonitoring Dynamik-Index text label: 'positiv'|'stabil'|'negativ'.
          Computed over a 3-year change window (vs Berlin MSS's 2-year).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["positiv", "stabil", "negativ"]
              config:
                where: "dynamik_index is not null"
      - name: gesamtindex_label
        description: >
          Source's own free-text composite label, e.g. "Status mittel - Dynamik 0".
          Hamburg does not publish Berlin's compact 2-digit numeric Gesamtindex code.
      - name: source_attribution
        description: Mandatory dl-de/by-2.0 attribution string (ADR-0014).
        tests:
          - not_null:
              config:
                where: "area_code is not null"

  - name: stg_hamburg_displacement_zones
    description: >
      Staging view over Hamburg "Soziale Erhaltungsverordnungen — Gebiete in
      Hamburg" (displacement-protection-zone polygons) — ADR-0014 Pillar 4,
      direct legal analogue of Berlin's Milieuschutz areas (§172 BauGB soziale
      Erhaltungssatzung). Berlin's own equivalent (#70 [B1]) remains `blocked`
      pending an architect ADR + maintainer source approval for FIS-Broker;
      this Hamburg pillar uses a different, already-ADR-0014-approved source
      (Transparenzportal, dl-de/by-2.0) and does not depend on #70. PLUMBING,
      not methodology (R-C1): straight polygon-attribute staging, no
      weighting/scoring/index-construction logic. Source: LGV Hamburg WFS
      (geodienste.hamburg.de) — endpoint/attribute names UNCONFIRMED live in
      this environment (no outbound network access); see the ingestion
      script's docstring for the endpoint-verification caveat. Ingestion
      adapter: ingestion/hamburg/displacement/ingest_hamburg_displacement.py.
      Storage: data/raw/hamburg/displacement/erhaltungsverordnung.parquet
      (gitignored). ~17 designated areas expected per ADR-0014. Returns zero
      rows (typed stub) when no parquet has been ingested.
    meta:
      dbt_meta_owner: data-engineer
    # Data-presence gate (docs/lessons/local-first-data-presence.md):
    tests:
      - assert_not_empty:
          config:
            severity: warn
      - assert_min_rows:
          arguments:
            min_rows: 10
          config:
            severity: warn
    columns:
      - name: city_code
        description: Canonical city code 'HH' (ADR-0005; matches dim_city.city_code).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["HH"]
      - name: area_code
        description: >
          Natural key / feature id for the designated Erhaltungsverordnung
          area. Does NOT join to stg_hamburg_geo.area_code (a bespoke
          designation boundary, not a statistisches-Gebiet aggregate).
        tests:
          - not_null
      - name: area_name
        description: Human-readable designation name (e.g. "Sternschanze").
      - name: bezirk_name
        description: Informational Bezirk the area sits in; NOT a join key.
      - name: in_force_date
        description: >
          ISO date string the Erhaltungsverordnung took effect, if published
          (ADR-0014 open question #4). Null where the source omits it.
      - name: geometry_wkb
        description: Geometry in WKB, native CRS EPSG:25832 (not reprojected).
        tests:
          - not_null
      - name: source_attribution
        description: Mandatory dl-de/by-2.0 attribution string (ADR-0014).
        tests:
          - not_null
  - name: stg_hamburg_ewr_stadtteil
    description: >
      Staging view over Hamburg "Regionalstatistische Daten der Stadtteile
      Hamburgs" (Stadtteil-grain socio-economic predictors) — ADR-0014
      Pillar 3, PRIMARY source only, direct conceptual analogue of
      stg_berlin_ewr but at Stadtteil grain (~104-105 areas) rather than
      statistisches-Gebiet grain. PLUMBING, not methodology (R-C1): raw
      ingestion + long-format staging only, at the grain the source itself
      publishes at. Does NOT join/reconcile down to statistisches-Gebiete
      (the two-grain reconciliation is methodology-bearing per ADR-0014
      open question #5, deferred to a dedicated geo-DS + domain-expert
      sign-off slice) and does NOT compute any weighted index or
      normalization. Source: Hamburg Transparenzportal CSV release,
      dl-de/by-2.0 (attribution: "Statistisches Amt fuer Hamburg und
      Schleswig-Holstein") — endpoint URL and column schema UNCONFIRMED
      live in this environment (no outbound network access); see the
      ingestion script's docstring for the verification caveat (mirrors
      every prior Hamburg-pillar ingestor's disclosure). Ingestion
      adapter: ingestion/hamburg/ewr/ingest_hamburg_ewr_stadtteil.py.
      Storage: data/raw/hamburg/ewr_stadtteil/stadtteile.parquet
      (gitignored). Indicator set (7, narrower than Berlin's 13):
      residents_total, residents_male_share, residents_female_share,
      age_under18_share, age_65plus_share, foreigners_share,
      unemployment_share. Returns zero rows (typed stub) when no parquet
      has been ingested.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - area_code
              - indicator
          config:
            where: "area_code is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md):
      - assert_not_empty:
          config:
            severity: warn
      - assert_min_rows:
          arguments:
            min_rows: 500
          config:
            severity: warn
    columns:
      - name: city_code
        description: Canonical city code 'HH' (ADR-0005; matches dim_city.city_code).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["HH"]
              config:
                where: "area_code is not null"
      - name: area_code
        description: >
          Stadtteil Schluessel. Joins to stg_hamburg_geo.area_code where
          area_level='subarea_l1'.
        tests:
          - not_null
      - name: area_vintage
        description: "'current' — single Stadtteil boundary edition (no vintage split needed)."
      - name: reference_year
        description: Calendar year of the annual Regionalstatistik release (2013 onward).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: indicator
        description: >
          One of the 7 indicator keys (see model description). UNCONFIRMED
          against the real source column headers — re-verify at first live
          ingestion (see ingest_hamburg_ewr_stadtteil.py docstring).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values:
                  - residents_total
                  - residents_male_share
                  - residents_female_share
                  - age_under18_share
                  - age_65plus_share
                  - foreigners_share
                  - unemployment_share
              config:
                where: "area_code is not null"
      - name: indicator_value
        description: Indicator value (NULL if privacy-suppressed in the source CSV).
      - name: is_suppressed_any
        description: >
          True if any indicator cell was privacy-suppressed for this
          Stadtteil x year (never coerced to 0).
      - name: source_attribution
        description: Mandatory dl-de/by-2.0 attribution string (ADR-0014).
        tests:
          - not_null:
              config:
                where: "area_code is not null"

  - name: stg_hamburg_wohnlage
    description: >
      Staging view over Hamburg "Wohnlagenverzeichnis" (address/street ->
      Wohnlage location-quality-tier crosswalk) — ADR-0014 Pillar 5,
      direct analogue of Berlin's stg_berlin_wohnlage. Companion dataset
      to stg_hamburg_mietenspiegel (the rent-table matrix itself).
      PLUMBING, not methodology (R-C1): a straight address/street-attribute
      staging pull, no weighting/scoring/index-construction logic and no
      cross-grain join to statistische Gebiete/Stadtteile. Deliberately
      preserves Hamburg's own Wohnlage label scheme as-published rather
      than remapping onto Berlin's einfach/mittel/gut scale (mirrors
      stg_hamburg_sozialmonitoring's decision not to invent a cross-city
      mapping ahead of the methodology-gated integration slice). Source:
      Hamburg Transparenzportal / geodienste.hamburg.de WFS, "Hamburger
      Mietenspiegel" dataset family (dl-de/by-2.0) — endpoint/attribute
      names UNCONFIRMED live in this environment (no outbound network
      access); see the ingestion script's docstring for the
      endpoint-verification caveat. Ingestion adapter:
      ingestion/hamburg/rent/ingest_hamburg_rent.py. Storage:
      data/raw/hamburg/rent/wohnlage.parquet (gitignored). Returns zero
      rows (typed stub) when no parquet has been ingested.
    meta:
      dbt_meta_owner: data-engineer
    # Data-presence gate (docs/lessons/local-first-data-presence.md):
    tests:
      - assert_not_empty:
          config:
            severity: warn
    columns:
      - name: city_code
        description: Canonical city code 'HH' (ADR-0005; matches dim_city.city_code).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["HH"]
      - name: address_id
        description: >
          Natural key / feature id for the address or street segment
          (schema TBC at live probe).
      - name: street_name
        description: Street name, if published at street rather than address grain.
      - name: wohnlage
        description: >
          Hamburg's own location-quality tier label (NOT assumed identical
          to Berlin's einfach/mittel/gut scheme). UNCONFIRMED against the
          real source schema — re-verify at first live ingestion.
        tests:
          - not_null
      - name: geometry_wkb
        description: >
          Address/street geometry in WKB, native CRS EPSG:25832 (not
          reprojected), if published.
      - name: source_attribution
        description: Mandatory dl-de/by-2.0 attribution string (ADR-0014).
        tests:
          - not_null

  - name: stg_hamburg_mietenspiegel
    description: >
      Staging view over the Hamburger Mietenspiegel (biennial rent-table
      matrix: year-built x size x Wohnlage -> rent range) — ADR-0014
      Pillar 5, direct analogue of Berlin's stg_berlin_mietspiegel.
      Companion dataset to stg_hamburg_wohnlage (address/street ->
      Wohnlage crosswalk). PLUMBING, not methodology (R-C1): a straight
      rent-table staging pull, no weighting/scoring/index-construction
      logic and no cross-grain join to statistische Gebiete/Stadtteile.
      Deliberately preserves Hamburg's own year_built_bucket/size_bucket/
      wohnlage labels as-published rather than remapping onto Berlin's
      bucket keys (mirrors stg_hamburg_wohnlage's and
      stg_hamburg_sozialmonitoring's decision not to invent a cross-city
      mapping ahead of the methodology-gated integration slice). Source:
      Hamburg Transparenzportal / geodienste.hamburg.de WFS, "Hamburger
      Mietenspiegel" dataset (dl-de/by-2.0) — endpoint/attribute names
      UNCONFIRMED live in this environment (no outbound network access);
      see the ingestion script's docstring for the endpoint-verification
      caveat. A PDF-fallback re-tabulation path (mirroring Berlin's D1
      Mietspiegel treatment) is NOT attempted in this slice and remains
      an open follow-up if the machine-readable WFS formats prove
      incomplete at live ingestion. Ingestion adapter:
      ingestion/hamburg/rent/ingest_hamburg_rent.py. Storage:
      data/raw/hamburg/rent/mietenspiegel.parquet (gitignored). Returns
      zero rows (typed stub) when no parquet has been ingested.
    meta:
      dbt_meta_owner: data-engineer
    # Data-presence gate (docs/lessons/local-first-data-presence.md):
    tests:
      - assert_not_empty:
          config:
            severity: warn
    columns:
      - name: edition_year
        description: Mietenspiegel edition year (biennial; e.g. 2025).
        tests:
          - not_null
      - name: city_code
        description: Canonical city code 'HH' (ADR-0005; matches dim_city.city_code).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["HH"]
      - name: year_built_bucket
        description: >
          Construction-period bucket, preserved as-published (NOT
          remapped onto Berlin's year_built_bucket keys in this staging
          layer).
      - name: size_bucket
        description: Apartment-size bucket, preserved as-published.
      - name: wohnlage
        description: Location tier, matching stg_hamburg_wohnlage's label scheme.
      - name: rent_low
        description: Lower rent-range bound (EUR/sqm/month).
      - name: rent_mid
        description: Mittelwert / central rent value (EUR/sqm/month).
      - name: rent_high
        description: Upper rent-range bound (EUR/sqm/month).
      - name: source_attribution
        description: Mandatory dl-de/by-2.0 attribution string (ADR-0014).
        tests:
          - not_null

  - name: stg_berlin_ewr
    description: >
      Staging view over annual EWR (Einwohnerregister) Parquet snapshots for Berlin.
      Produced by ingestion/berlin/ewr/ingest_ewr.py (ADR-0003, EWR section):
      "Einwohnerinnen und Einwohner in Berlin in LOR-Planungsraeumen am 31.12.YYYY"
      published by Amt fuer Statistik Berlin-Brandenburg (CC BY 3.0 DE) on
      daten.berlin.de. One parquet per year under data/raw/berlin/ewr/<year>.parquet
      (gitignored per ADR-0008). Each row is one indicator value for one PLR area
      at one 31-Dec reference date. Long format: 13 indicators x ~542 PLR areas
      x number of ingested years. source_attribution column carries the CC BY
      attribution string.
      Returns zero rows (typed stub) when no parquet files have been ingested yet,
      so downstream models and dbt build pass before data download.
      See seed_ewr_indicator_meta for indicator definitions and caveats.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - area_code
              - indicator
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "indicator_value between 0 and 1"
          config:
            where: "area_code is not null and indicator not in ('residents_total', 'mean_age_years') and indicator_value is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md):
      - assert_not_empty:
          config:
            severity: error
      - assert_min_rows:
          arguments:
            min_rows: 2000
          config:
            severity: warn
    columns:
      - name: city_code
        description: >
          City identifier; canonical 'BER' (ADR-0005). Normalised from the
          parquet source value ('berlin') at the staging boundary so that it
          matches dim_city and dim_area for downstream joins.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["BER"]
              config:
                where: "area_code is not null"
      - name: area_code
        description: >
          PLR (Planungsraum) identifier, zero-padded to 8 characters.
          Matches the LOR area code scheme used in dim_area.
        tests:
          - not_null:
              config:
                where: "reference_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage for this area code.
          'lor_pre2021': pre-2021 LOR layout (reference_year <= 2020).
          'lor_2021': LOR 2021 reform layout (reference_year >= 2021).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: reference_year
        description: >
          Calendar year of the 31-December snapshot (integer). Range: 2008-2024.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: reference_date
        description: >
          The 31-December snapshot date as a DATE (e.g. 2018-12-31).
          Always the last day of reference_year.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: indicator
        description: >
          Indicator key from the approved 13-indicator set (see seed_ewr_indicator_meta).
          One of: residents_total, residents_male_share, residents_female_share,
          age_under18_share, age_18_27_share, age_27_45_share, age_45_65_share,
          age_65plus_share, mean_age_years, foreigners_share,
          migration_background_share, residence_duration_5y_share,
          residence_duration_10y_share.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values:
                  - residents_total
                  - residents_male_share
                  - residents_female_share
                  - age_under18_share
                  - age_18_27_share
                  - age_27_45_share
                  - age_45_65_share
                  - age_65plus_share
                  - mean_age_years
                  - foreigners_share
                  - migration_background_share
                  - residence_duration_5y_share
                  - residence_duration_10y_share
              config:
                where: "area_code is not null"
      - name: indicator_value
        description: >
          Computed indicator value. Shares are in [0, 1]; residents_total is a
          count; mean_age_years is in decimal years. May be NULL for migration_
          background_share when the source column is absent in a given year, or
          NULL when is_suppressed_any is True (suppressed cells are never coerced
          to 0).
      - name: is_suppressed_any
        description: >
          Boolean flag: True when any numeric indicator cell for this PLR row was
          privacy-suppressed in the source EWR CSV (values '-', '.', blank, or
          similar sentinels). When True, one or more indicator_value fields for
          this PLR x year combination may be NULL. Never coerced to False or 0.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: source_attribution
        description: >
          CC BY 3.0 DE attribution string (mandatory per licence). Value:
          "Amt fuer Statistik Berlin-Brandenburg / Einwohnerregister
          Berlin-Brandenburg (EWR), CC BY 3.0 DE --
          https://www.statistik-berlin-brandenburg.de/"
        tests:
          - not_null:
              config:
                where: "area_code is not null"

  # --- D1: Berlin price/rent data (Bodenrichtwerte, Wohnlage, Kauffälle stub) ---

  - name: stg_berlin_bodenrichtwert
    description: >
      D1a staging view over Bodenrichtwerte (land reference values) back-series 2017–2024
      for Berlin. Source: WFS GDI Berlin brw{year}, feature type brw{year}:brw_{year}_vector,
      CRS EPSG:25833. Licence: dl-de-zero-2.0. All years 2017–2024 confirmed live via
      HTTP 200 probe on 2026-06-29.
      Populated by ingestion/berlin/price_rent/ingest_bodenrichtwerte.py.
      Returns zero rows (typed stub) until at least one bodenrichtwert_{year}.parquet
      exists under data/raw/berlin/price_rent/. Each row is one BRW land value zone
      polygon with the EUR/m2 value and land use code for the given reference year.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_date
              - brw_id
          config:
            where: "brw_id is not null"
      - assert_not_empty:
          config:
            severity: warn
      - assert_min_rows:
          arguments:
            min_rows: 1000
          config:
            severity: warn
    columns:
      - name: reference_date
        description: Reference date for the BRW; YYYY-01-01 for the given data year (2017–2024).
        tests:
          - not_null:
              config:
                where: "brw_id is not null"
      - name: city_code
        description: City identifier; always 'berlin' (ADR-0005).
        tests:
          - not_null:
              config:
                where: "brw_id is not null"
          - accepted_values:
              arguments:
                values: ["berlin"]
              config:
                where: "brw_id is not null"
      - name: geometry_wkb
        description: Zone polygon in WKB, CRS EPSG:25833.
      - name: brw_id
        description: BRW zone identifier (brwid WFS attribute).
        tests:
          - not_null:
              config:
                where: "city_code is not null"
      - name: value_eur_per_m2
        description: Bodenrichtwert land value in EUR per m2 (brw WFS attribute).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              config:
                where: "brw_id is not null and value_eur_per_m2 is not null"
      - name: nutzung
        description: Land use code (nutzung WFS attribute; e.g. 'W - Wohngebiet').
      - name: source_attribution
        description: dl-de-zero-2.0 attribution string.
        tests:
          - not_null:
              config:
                where: "brw_id is not null"

  - name: stg_berlin_wohnlage
    description: >
      D1 staging view over Wohnlagen nach Adressen (Mietspiegel) back-series for Berlin.
      Covers vintages 2017, 2019, 2021, 2023, 2026 — one parquet per edition year.
      Source: WFS GDI Berlin wohnlagenadr{year}, feature type
      wohnlagenadr{year}:wohnlagenadr{year}, CRS EPSG:25833. Licence: dl-de-zero-2.0.
      ~397k address-level point features per vintage. All five vintages confirmed live
      on GDI Berlin 2026-06-18. Populated by
      ingestion/berlin/price_rent/ingest_wohnlage.py (5-15 min per vintage).
      Returns zero rows (typed stub) until at least one wohnlage_{year}.parquet
      exists under data/raw/berlin/price_rent/. Each row is one address with its
      Wohnlage classification (einfach/mittel/gut) for the given Mietspiegel edition.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - vintage
              - address_id
          config:
            where: "wohnlage is not null and address_id is not null"
      - assert_not_empty:
          config:
            severity: warn
      - assert_min_rows:
          arguments:
            min_rows: 100000
          config:
            severity: warn
    columns:
      - name: vintage
        description: WFS edition year (2017/2019/2021/2023/2026); NOT the Stichtag year.
        tests:
          - not_null:
              config:
                where: "wohnlage is not null"
      - name: city_code
        description: City identifier; always 'berlin' (ADR-0005).
        tests:
          - not_null:
              config:
                where: "wohnlage is not null"
          - accepted_values:
              arguments:
                values: ["berlin"]
              config:
                where: "wohnlage is not null"
      - name: geometry_wkb
        description: Address point in WKB (MultiPoint), CRS EPSG:25833.
      - name: wohnlage
        description: Wohnlage classification (wol WFS attribute; einfach/mittel/gut).
        tests:
          - not_null:
              config:
                where: "city_code is not null"
          - accepted_values:
              arguments:
                values: ["einfach", "mittel", "gut"]
              config:
                where: "city_code is not null"
      - name: address_id
        description: Address/block identifier (schluessel WFS attribute; nullable).
      - name: source_attribution
        description: dl-de-zero-2.0 attribution string.
        tests:
          - not_null:
              config:
                where: "wohnlage is not null"

  - name: stg_berlin_verkaufte_grundstuecke
    description: >
      D1b — Verkaufte Grundstücke (Kauffälle) Berlin 2024 + 2025, GDI Berlin WFS,
      dl-de-zero-2.0. Publisher: Gutachterausschuss für Grundstückswerte in Berlin.
      WFS endpoint confirmed 2026-06-29: https://gdi.berlin.de/services/wfs/kauffaelle_{year}.
      9 sub-market layers per year (a_teileigen … i_mehrfamhaus). IMPORTANT: only
      2024 and 2025 are available via WFS; no endpoint exists for earlier years —
      this historical coverage gap must be disclosed in D2 and on the G2 methodology page.
      Graceful-degradation: returns zero rows when parquet files are not yet ingested.
      Run ingestion/berlin/price_rent/ingest_kauffaelle.py to populate.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: reference_date
        description: Reference date; YYYY-01-01 for the given data year.
      - name: city_code
        description: City identifier; always 'berlin' (ADR-0005).
        tests:
          - not_null:
              config:
                where: "transaction_id is not null"
          - accepted_values:
              arguments:
                values: ["berlin"]
              config:
                where: "transaction_id is not null"
      - name: teilmarkt
        description: >
          Sub-market layer code (e.g. 'c_eigentwhg' = Eigentumswohnungen,
          'i_mehrfamhaus' = Mehrfamilienwohnhäuser). Primary layers for gentrification
          analysis are c_eigentwhg and i_mehrfamhaus.
        tests:
          - not_null:
              config:
                where: "transaction_id is not null"
      - name: geometry_wkb
        description: Point/geometry WKB, EPSG:25833 (native CRS, not reprojected).
      - name: transaction_id
        description: >
          Year-prefixed WFS feature ID (e.g. '2024_c_eigentwhg.1'). Year prefix
          ensures global uniqueness across the UNION ALL of multiple year parquets.
        tests:
          - not_null:
              config:
                where: "transaction_id is not null"
          - unique:
              config:
                where: "transaction_id is not null"
      - name: kaufpreis_eur
        description: >
          Purchase price in EUR. Null if not exposed by WFS DescribeFeatureType
          (actual feature properties inspected at ingestion time).
      - name: flaeche_m2
        description: Plot or floor area in m2. Null if not exposed by WFS.
      - name: kauftyp
        description: Sub-market type string from WFS (kauftyp attribute).
      - name: raw_properties_json
        description: >
          Full JSON of all WFS feature properties, stored for audit and schema
          discovery. Allows downstream models to extract additional attributes
          once confirmed from live data.
      - name: source_attribution
        description: DL-Zero-2.0 attribution string.
        tests:
          - not_null:
              config:
                where: "transaction_id is not null"

  - name: stg_berlin_mietspiegel
    description: >
      D1 staging view over the multi-vintage Berliner Mietspiegel seed (ADR-0003 item 11).
      Source: berlin_mietspiegel seed — transcribed numeric values from official PDFs.
      PDFs not redistributed. All cells represent standard equipment (mit SH, Bad, IWC).
      ausstattung is NOT a table dimension; footnote deductions handle non-standard units.
      2017 vintage complete (92 rows); 2019/2021/2023/2024 pending transcription.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "rent_low <= rent_mid"
          config:
            severity: warn
            where: "vintage is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "rent_mid <= rent_high"
          config:
            severity: warn
            where: "vintage is not null"
    columns:
      - name: vintage
        description: Mietspiegel edition year (2017, 2019, 2021, 2023, 2024).
        tests:
          - not_null
      - name: city_code
        description: City identifier; always 'berlin' (ADR-0005).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["berlin"]
      - name: year_built_bucket
        description: Construction year bucket (e.g. 'pre_1918', '2003_2015').
        tests:
          - not_null
      - name: size_bucket
        description: Apartment floor area bucket ('under_40', '40_to_60', '60_to_90', '90_plus').
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["under_40", "40_to_60", "60_to_90", "90_plus"]
      - name: wohnlage
        description: Location quality tier (einfach/mittel/gut).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["einfach", "mittel", "gut"]
      - name: rent_low
        description: Lower bound of the 3/4-Spanne (EUR/m2/month, net cold rent).
        tests:
          - not_null
      - name: rent_mid
        description: Median net cold rent (EUR/m2/month).
        tests:
          - not_null
      - name: rent_high
        description: Upper bound of the 3/4-Spanne (EUR/m2/month, net cold rent).
        tests:
          - not_null
      - name: source_attribution
        description: Source citation including edition year, publisher, and reference date.
        tests:
          - not_null

  # --- R-A3: Berlin MSS (Monitoring Soziale Stadtentwicklung) ---

  - name: stg_berlin_mss
    description: >
      Staging view over MSS (Monitoring Soziale Stadtentwicklung) Parquet files produced
      by ingestion/berlin/mss/ingest_mss.py (ADR-0006, GDI Berlin WFS, dl-de-zero-2.0).
      One row per (edition, PLR). Editions: 2013, 2015, 2017, 2019, 2021, 2023, 2025
      (2013/2015/2017 are best-effort — WFS may not exist for older editions). Firm editions: 2019–2025.
      Boundary-vintage break: editions <=2019 use lor_pre2021 (447 PLR);
      editions >=2021 use lor_2021 (542 PLR). Uninhabited PLR rows have null index
      values. Returns zero rows (typed stub) until parquets are ingested.
      Primary outcome variable for R-A1 re-grounding of the gentrification index.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - edition
              - area_code
          config:
            where: "area_code is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md):
      # status_index is the R-A1 social outcome — an empty MSS source means the
      # entire re-grounded index is hollow, so fail the build loudly.
      - assert_not_empty:
          config:
            severity: error
      - assert_min_rows:
          arguments:
            min_rows: 400
          config:
            severity: warn
    columns:
      - name: city_code
        description: City identifier; always 'BER' (ADR-0005).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["BER"]
              config:
                where: "area_code is not null"
      - name: area_vintage
        description: >
          LOR boundary vintage. 'lor_pre2021' for editions <=2019 (447 PLR);
          'lor_2021' for editions >=2021 (542 PLR). See ADR-0003/ADR-0006.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR identifier zero-padded to 8 characters. Joins to stg_berlin_lor.
        tests:
          - not_null:
              config:
                where: "edition is not null"
      - name: area_name
        description: Human-readable Planungsraum name (German proper noun from WFS).
      - name: edition
        description: MSS publication year (2013, 2015, 2017, 2019, 2021, 2023, 2025).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: status_index
        description: >
          MSS Status-Index class: 1=hoch, 2=mittel, 3=niedrig, 4=sehr niedrig.
          Null for uninhabited PLR rows (WFS sentinel -9999).
        tests:
          - not_null:
              config:
                where: "area_code is not null and gesamtindex is not null"
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
              config:
                where: "status_index is not null"
      - name: dynamik_index
        description: >
          MSS Dynamik-Index class (normalised): 1=positiv, 2=stabil, 3=negativ.
          Mapped from WFS di_n {1,3,5}. Null for uninhabited PLR rows.
        tests:
          - not_null:
              config:
                where: "area_code is not null and gesamtindex is not null"
          - accepted_values:
              arguments:
                values: [1, 2, 3]
              config:
                where: "dynamik_index is not null"
      - name: gesamtindex
        description: >
          MSS Gesamtindex sozialer Ungleichheit — official 2-digit group code.
          Tens digit = status class (1–4); units digit = dynamik WFS code (1=pos, 3=stab, 5=neg).
          Valid codes: 11, 13, 15, 21, 23, 25, 31, 33, 35, 41, 43, 45 (12 groups).
          Null for uninhabited PLR rows. Corresponds to the Status-Dynamik-Index
          published in MSS reports.
        tests:
          - accepted_values:
              values: [11, 13, 15, 21, 23, 25, 31, 33, 35, 41, 43, 45]
              config:
                where: "gesamtindex is not null"
      - name: source_attribution
        description: >
          dl-de-zero-2.0 attribution string. Value:
          "Senatsverwaltung für Stadtentwicklung, Bauen und Wohnen Berlin
          — Monitoring Soziale Stadtentwicklung <edition>"
        tests:
          - not_null:
              config:
                where: "area_code is not null"

  # --- R-A4: Berlin MSS indexind SES indicators ---

  - name: stg_berlin_mss_indicators
    description: >
      Staging view over MSS indexind Parquet files produced by
      ingestion/berlin/mss/ingest_mss_indicators.py (ADR-0007, GDI Berlin WFS,
      dl-de-zero-2.0). Long format: one row per (edition, PLR, indicator).
      Editions: 2013, 2015, 2017, 2019, 2021, 2023, 2025 (2013 is 404/skipped;
      2015/2017 are best-effort; 2019–2025 are firm).
      Boundary-vintage break: editions <=2019 use lor_pre2021 (447 PLR);
      editions >=2021 use lor_2021 (542 PLR). Uninhabited PLR rows have null values.
      The transferbezug_* indicators carry null values in editions <=2021 (WFS
      published 's2_x'/'d2_x' columns which were always null in that span).
      Returns zero rows (typed stub) until parquets are ingested.
      Primary SES predictor input for R-A1 re-grounding of the gentrification index.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - edition
              - area_code
              - indicator
          config:
            where: "area_code is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md):
      - assert_not_empty:
          config:
            severity: error
      - assert_min_rows:
          arguments:
            min_rows: 2000
          config:
            severity: warn
    columns:
      - name: city_code
        description: City identifier; always 'BER' (ADR-0005).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["BER"]
              config:
                where: "area_code is not null"
      - name: edition
        description: MSS publication year (2013, 2015, 2017, 2019, 2021, 2023, 2025).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR identifier zero-padded to 8 characters. Joins to stg_berlin_lor.
        tests:
          - not_null:
              config:
                where: "edition is not null"
      - name: area_name
        description: Human-readable Planungsraum name (German proper noun from WFS).
      - name: area_vintage
        description: >
          LOR boundary vintage. 'lor_pre2021' for editions <=2019 (447 PLR);
          'lor_2021' for editions >=2021 (542 PLR). See ADR-0003/ADR-0007.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: indicator
        description: >
          Canonical snake_case indicator name. Status-level set:
          arbeitslose_anteil (unemployment SGB II),
          transferbezug_anteil (transfer benefit receipt SGB II/XII; null pre-2023),
          kinderarmut_anteil (child poverty SGB II u15),
          alleinerziehende_anteil (children in single-parent households; all editions 2015+;
          present despite ADR-0006 stating 2023+ only — WFS probing confirmed).
          Dynamik set (change versions): arbeitslose_dynamik, transferbezug_dynamik,
          kinderarmut_dynamik, alleinerziehende_dynamik (all editions 2015+).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              values:
                - arbeitslose_anteil
                - transferbezug_anteil
                - kinderarmut_anteil
                - alleinerziehende_anteil
                - arbeitslose_dynamik
                - transferbezug_dynamik
                - kinderarmut_dynamik
                - alleinerziehende_dynamik
              config:
                where: "area_code is not null"
      - name: indicator_value
        description: >
          Float indicator value (percentage or ratio as published by WFS).
          Null for uninhabited PLR rows (WFS sentinel -9999) or where the WFS
          column was absent/suspended for that edition (transferbezug_* in <=2021).
      - name: source_attribution
        description: >
          dl-de-zero-2.0 attribution string. Value:
          "Senatsverwaltung für Stadtentwicklung, Bauen und Wohnen Berlin
          — Monitoring Soziale Stadtentwicklung <edition>"
        tests:
          - not_null:
              config:
                where: "area_code is not null"
