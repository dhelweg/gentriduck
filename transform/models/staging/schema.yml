version: 2

models:
  - name: stg_thesis_2018_result_bzr
    description: >
      Staging view over the 2018 thesis golden CSV at BZR (Bezirksregion) level.
      Strips the 'r.' column prefix, casts key columns, and adds city_code='BER'
      and area_level='bzr'. Key columns only — the full 1722-column source is not
      carried forward. ODbL-licensed; see reference/goldens/ODbL_LICENCE.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: BZR area code (string; e.g. '010111').
        tests:
          - not_null
      - name: raum_desc
        description: BZR area name (German; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM (e.g. 201612).
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER' for this staging model.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'bzr' for this staging model.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: status_klasse_prj_bi
        description: Projected status class (binary; hoch/mittel/niedrig).
        tests:
          - accepted_values:
              arguments:
                values: ["hoch", "mittel", "niedrig"]
      - name: dynamik_klasse_prj_bi
        description: Projected dynamik class (binary; positiv/neutral/negativ).
        tests:
          - accepted_values:
              arguments:
                values: ["positiv", "neutral", "negativ"]

  - name: stg_thesis_2018_result_plr
    description: >
      Staging view over the 2018 thesis golden CSV at PLR (Planungsraum) level.
      Same structure as stg_thesis_2018_result_bzr; area_level='plr'.
      436 rows. ODbL-licensed.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: PLR area code (string).
        tests:
          - not_null
      - name: raum_desc
        description: PLR area name (German; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM.
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'plr'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: status_klasse_prj_bi
        description: Projected status class (binary).
        tests:
          - accepted_values:
              arguments:
                values: ["hoch", "mittel", "niedrig"]
      - name: dynamik_klasse_prj_bi
        description: Projected dynamik class (binary).
        tests:
          - accepted_values:
              arguments:
                values: ["positiv", "neutral", "negativ"]

  - name: stg_thesis_2018_result_plr_distcalc
    description: >
      Staging view over the 2018 thesis golden CSV at PLR level using
      distance-weighted POI features (the Java UDF variant). 436 rows.
      area_level='plr', is_distance_weighted=true.
      In Gentriduck the distance-weighted variant will be reproduced via DuckDB
      ST_Distance / ST_DWithin (Epic B3/C); for now this staging model surfaces
      the golden output as the reference for that variant.
      ODbL-licensed.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: raum_id
        description: PLR area code (string).
        tests:
          - not_null
      - name: raum_desc
        description: PLR area name (German; latin-1 decoded).
        tests:
          - not_null
      - name: zeit
        description: Reporting period as integer YYYYMM.
        tests:
          - not_null
      - name: city_code
        description: City identifier, always 'BER'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier, always 'plr'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: is_distance_weighted
        description: >
          Flag indicating that POI features were distance-weighted in this variant.
          Always true for this staging model.
        tests:
          - not_null

  # --- Stubs (no tests — zero rows; populated by Epic B2/C ingestion) ---

  - name: stg_osm_poi
    description: >
      STUB — zero rows until Epic B2/C OSM ingestion lands.
      See ADR-0002 (OSM POI history sourcing). When populated, each row represents
      one OSM POI feature at a given snapshot_year for a city/area.
      Schema matches the expected output of the ohsome-API ingestion adapter
      (ingestion/berlin/osm/ — not yet implemented).
    meta:
      dbt_meta_owner: data-engineer

  - name: stg_berlin_lor
    description: >
      STUB — zero rows until Epic B2/C LOR geometry ingestion lands.
      See ADR-0003 (Berlin geographies). When populated, each row represents one
      LOR area polygon at a given vintage (pre-2021 or LOR 2021), conformed to the
      city-agnostic area_level vocabulary (bezirk/bzr/plr).
      Source: gdi.berlin.de WFS (CC BY 3.0 DE).
      Ingestion adapter: ingestion/berlin/geographies/ (not yet implemented).
    meta:
      dbt_meta_owner: data-engineer

  - name: stg_berlin_ewr
    description: >
      STUB — zero rows until Epic B2/C3b EWR ingestion lands.
      See ADR-0003 (Berlin geographies + open sources). When populated, each row
      represents one socio-economic indicator value per area per year, sourced
      from the Einwohnerregister (EWR) per-PLR CSV published by Amt fur Statistik
      Berlin-Brandenburg (CC BY 3.0 DE) on daten.berlin.de.
      Ingestion adapter: ingestion/berlin/ewr/ (not yet implemented).
    meta:
      dbt_meta_owner: data-engineer
