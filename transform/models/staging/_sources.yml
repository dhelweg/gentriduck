version: 2

sources:
  - name: thesis_2018
    description: >
      Read-only golden output CSVs from the 2018 Berlin gentrification thesis
      (dhelweg/masterthesis2018_gentrification), committed under reference/goldens/.
      These three CSV files are the directional comparison baseline for Epic B (B5/B6).
      The CSVs are latin-1 encoded; dbt-duckdb reads them via read_csv with
      encoding='latin-1'. ODbL-licensed (see reference/goldens/ODbL_LICENCE).
      Staging models reference these as documentation / lineage anchors only;
      the actual path is resolved in each staging model via the project variable
      'project_root' (see dbt_project.yml vars).
    meta:
      source_type: reference_golden
      licence: ODbL
      attribution: >
        OpenStreetMap contributors / dhelweg/masterthesis2018_gentrification
        (2018 Berlin gentrification thesis). See reference/goldens/ODbL_LICENCE.

    tables:
      - name: result_full_bzr
        description: >
          Per-BZR (Bezirksregion, ~137 rows) golden output from the 2018 thesis,
          generated 2018-09-09. Contains every index metric the paper reports; columns
          are prefixed 'r.' from the original Hive SELECT *. Area level: bzr.
          Read by stg_thesis_2018_result_bzr via read_csv with encoding='latin-1'.

      - name: result_full_plr
        description: >
          Per-PLR (Planungsraum, 436 rows) golden output from the 2018 thesis,
          generated 2018-09-09. Columns prefixed 'r.'. Area level: plr.
          Read by stg_thesis_2018_result_plr via read_csv with encoding='latin-1'.

      - name: result_full_plr_distcalc
        description: >
          Per-PLR golden output using distance-weighted POI features (the Java UDF
          variant from the 2018 thesis). 436 rows. Columns prefixed 'r.'. Area level: plr.
          Exposes the 'distance_weighted' variant of the gentrification index.
          Read by stg_thesis_2018_result_plr_distcalc via read_csv with encoding='latin-1'.

  - name: price_rent
    description: >
      D1 Berlin price and rent open data sources (reference year 2023/2024).
      All three sources are published by the Senatsverwaltung fuer Stadtentwicklung,
      Bauen und Wohnen Berlin under dl-de-zero-2.0 (Datenlizenz Deutschland Zero)
      and require attribution. Raw data is gitignored (ADR-0008) and rebuilt from
      open source WFS endpoints by the ingestion scripts in
      ingestion/berlin/price_rent/.
    meta:
      source_type: wfs_parquet
      licence: dl-de-zero-2.0
      attribution: >
        Senatsverwaltung fuer Stadtentwicklung, Bauen und Wohnen Berlin /
        Gutachterausschuss fuer Grundstueckswerte in Berlin.
        Datenlizenz Deutschland Zero 2.0 (dl-de-zero-2.0).

    tables:
      - name: bodenrichtwert_2024
        description: >
          Bodenrichtwerte (land reference values) as of 2024-01-01 for Berlin.
          Polygon WFS layer: brw2024:brw_2024_vector from
          https://gdi.berlin.de/services/wfs/brw2024 (CRS EPSG:25833).
          Populated by ingestion/berlin/price_rent/ingest_bodenrichtwerte.py.
          Output: data/raw/berlin/price_rent/bodenrichtwert_2024.parquet.
          Staging model: stg_berlin_bodenrichtwert.
          Key attributes: brwid (zone ID), brw (EUR/m2), nutzung (land use).
          Attribution: Senatsverwaltung fuer Stadtentwicklung, Bauen und Wohnen
          Berlin / Gutachterausschuss fuer Grundstueckswerte in Berlin,
          Bodenrichtwerte Berlin 2024, dl-de-zero-2.0 --
          https://daten.berlin.de/datensaetze/bodenrichtwerte-01-01-2024-wfs-c2092cb3

      - name: wohnlage_2023
        description: >
          Wohnlagen nach Adressen zum Berliner Mietspiegel 2023.
          Address-level point WFS layer: wohnlagenadr2023:wohnlagenadr2023 from
          https://gdi.berlin.de/services/wfs/wohnlagenadr2023 (CRS EPSG:25833).
          ~397,542 features; paginated at 500 features per request.
          Populated by ingestion/berlin/price_rent/ingest_wohnlage.py (5-15 min).
          Output: data/raw/berlin/price_rent/wohnlage_2023.parquet.
          Staging model: stg_berlin_wohnlage.
          Key attributes: wol (Wohnlage: einfach/mittel/gut), schluessel (address ID).
          Attribution: Senatsverwaltung fuer Stadtentwicklung, Bauen und Wohnen
          Berlin, Wohnlagen Mietspiegel 2023, dl-de-zero-2.0 --
          https://daten.berlin.de/datensaetze/wohnlagen-nach-adressen-zum-berliner-mietspiegel-2023-wfs-b9979169

      # NOTE: berlin_mietspiegel_2024 is a seed (seeds/berlin_mietspiegel_2024.csv),
      # not a WFS source. It is documented in seeds/schema.yml under berlin_mietspiegel_2024.
      # Do not add it here — the price_rent source block is for WFS-backed parquet
      # tables only (dl-de-zero-2.0 licence); the Mietspiegeltabelle has a different
      # provenance (manually transcribed from PDF; factual data only, ADR-0003 item 11).
