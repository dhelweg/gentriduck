version: 2

models:
  - name: int_thesis_2018_area_index
    description: >
      Conformed union of all three 2018 thesis golden staging models (bzr standard,
      plr standard, plr distance_weighted). Normalises column names to the shared
      mart schema. This is the single source of truth for the 2018 thesis index
      within the Gentriduck warehouse and is used directly by the gentrification_index
      mart. When Epic B3/C ingestion lands, this model is replaced/extended with
      computed values; until then it serves as the directional baseline per the
      Epic B strategy (docs/epic-b/B0-input-inventory.md).
      All German data values are translated to English by the upstream staging models.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER' from the thesis goldens.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier. Values from seed_dim_area_level.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: area_code
        description: Area code (raum_id from the thesis golden).
        tests:
          - not_null
      - name: area_name
        description: Area name (raum_desc; German proper noun; latin-1 decoded).
        tests:
          - not_null
      - name: period_yyyymm
        description: Reporting period as string YYYYMM (e.g. '201612').
        tests:
          - not_null
      - name: variant
        description: >
          Index variant discriminator. 'standard' uses non-distance-weighted POI
          features; 'distance_weighted' uses the POI inverse-distance weighting
          from the 2018 thesis Java UDF (to be reproduced in DuckDB ST_Distance/
          ST_DWithin in Epic B3/C).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["standard", "distance_weighted"]
      - name: status_class_bi
        description: >
          Projected status class (binary English label; high/medium/low).
          high = low deprivation / high POI status score.
          low = high deprivation / low POI status score.
          See B5-findings-check.md for the label polarity explanation.
        tests:
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
      - name: dynamism_class_bi
        description: >
          Projected dynamism class (binary English label; positive/neutral/negative).
          positive = high gentrification pressure / above-average POI churn.
          negative = low gentrification pressure / below-average POI churn.
        tests:
          - accepted_values:
              arguments:
                values: ["positive", "neutral", "negative"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_level
              - area_code
              - period_yyyymm
              - variant

  - name: dim_city
    description: >
      Conformed city dimension (ADR-0005 city-agnostic seam). One row per city.
      Currently Berlin only (BER). Sourced from seed_dim_city. Multi-city expansion
      (Epic H) adds a new seed row + adapter without changing this model or any mart.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: city_code
        description: Short city identifier (e.g. 'BER'). Natural key.
        tests:
          - not_null
          - unique
      - name: city_name
        description: Human-readable city name (e.g. 'Berlin').
        tests:
          - not_null
      - name: country_code
        description: ISO 3166-1 alpha-2 country code (e.g. 'DE').
        tests:
          - not_null

  - name: dim_area
    description: >
      Conformed area dimension (ADR-0005 city-agnostic seam). Distinct
      (city_code, area_level, area_code, area_name) from int_thesis_2018_area_index
      joined with seed_dim_area_level for level_name.
      NOTE: parent_area_code is intentionally omitted until stg_berlin_lor is
      populated (Epic B2/C). When the LOR geometry ingestion lands, add the parent
      crosswalk via a join on (city_code, area_code, area_level). See model SQL for
      details.
      Area names are Berlin proper nouns and are kept in German.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: city_code
        description: City identifier (FK -> dim_city).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_city')
                field: city_code
      - name: area_level
        description: Area level identifier.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: area_code
        description: Area code. Natural key within (city_code, area_level).
        tests:
          - not_null
      - name: area_name
        description: Area name (German proper noun; Berlin place names).
        tests:
          - not_null
      - name: level_name
        description: Human-readable level name from seed_dim_area_level.

  - name: int_ewr_series
    description: >
      EWR socio-economic time series joined to the conformed area dimension
      (ADR-0005). Selects from stg_berlin_ewr (long-format, PLR grain,
      13 indicators) and inner-joins dim_area to attach area metadata.
      Graceful-degradation: returns zero rows when stg_berlin_ewr has no data
      (ingestion not yet run) OR when dim_area does not yet include PLR rows
      with city_code='berlin' (stg_berlin_lor stub). Both conditions must be
      met for rows to appear; zero rows is correct at this stage.
      One output row = one indicator for one PLR area for one reference year.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - reference_year
              - indicator
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "indicator_value between 0 and 1"
          config:
            where: "area_code is not null and indicator not in ('residents_total', 'mean_age_years') and indicator_value is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER' (normalized from 'berlin' at stg_berlin_ewr staging boundary).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR identifier (zero-padded to 8 chars). FK -> dim_area.area_code.
        tests:
          - not_null:
              config:
                where: "reference_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage: 'lor_pre2021' (reference_year <= 2020) or
          'lor_2021' (reference_year >= 2021).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: reference_year
        description: Calendar year of the 31-Dec snapshot (integer, 2008-2024).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: reference_date
        description: 31-Dec snapshot date as DATE (e.g. 2018-12-31).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: indicator
        description: >
          Indicator key from the 13-indicator approved set
          (see seed_ewr_indicator_meta for definitions).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values:
                  - residents_total
                  - residents_male_share
                  - residents_female_share
                  - age_under18_share
                  - age_18_27_share
                  - age_27_45_share
                  - age_45_65_share
                  - age_65plus_share
                  - mean_age_years
                  - foreigners_share
                  - migration_background_share
                  - residence_duration_5y_share
                  - residence_duration_10y_share
              config:
                where: "area_code is not null"
      - name: indicator_value
        description: >
          Computed indicator value. Shares in [0, 1]; residents_total is a count;
          mean_age_years in decimal years. May be NULL where source column absent.
      - name: source_attribution
        description: CC BY 3.0 DE attribution string from the EWR source.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_name
        description: Area name from dim_area (German proper noun; Berlin place names).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_level
        description: Area level from dim_area (e.g. 'plr').
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: level_name
        description: Human-readable level name from dim_area / seed_dim_area_level.

  - name: int_berlin_ewr_plr2021
    description: >
      Aligns the EWR socio-economic time series to the unified LOR 2021 PLR scheme.
      Rows with area_vintage='lor_2021' (reference_year >= 2021) are passed through
      directly. Rows with area_vintage='lor_pre2021' (reference_year <= 2020) are
      joined to seed_lor_crosswalk_2006_to_2021 and indicator_value is weighted by
      the crosswalk weight (1.0 for 1:1 maps, fractional for splits).

      When multiple pre-2021 PLRs contribute to the same 2021 PLR, indicator values
      are aggregated as SUM(value * weight) per (reference_year, plr_id_2021, indicator).
      For extensive indicators (counts): exact. For intensive indicators (rates/shares):
      approximates a population-weighted average under uniform-population-within-PLR
      assumption (standard practice at the Berlin PLR spatial scale).

      Status (as of 2026-06-19): seed_lor_crosswalk_2006_to_2021 is POPULATED with
      3055 areal_pop_weighted rows from GDI Berlin WFS geometries (EPSG:25833) via
      ingestion/berlin/lor/ingest_lor_crosswalk.py. Geo-DS approved 2026-06-19
      (docs/epic-c/C3-crosswalk-geo-signoff.md, verdict PASS). Both pre-2021 and
      2021 rows now produce output; the 2020->2021 vintage boundary is bridged.

      All output rows use area_vintage='lor_2021' (they are all in the 2021 PLR scheme).
      crosswalk_weight and crosswalk_type are NULL post-aggregation (not meaningful).

      Known breaks (inherited):
        - LOR 2021 reform: resolved by this model for aligned analysis.
        - Migrationshintergrund ~2017: see seed_ewr_indicator_meta (stable_from_year=2017).
          This model does not filter; consumers should apply reference_year >= 2017
          for migration_background_share.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - plr_id_2021
              - indicator
          config:
            where: "plr_id_2021 is not null"
    columns:
      - name: city_code
        description: City identifier; always 'BER' (ADR-0005; normalized at stg_berlin_ewr staging boundary).
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: plr_id_2021
        description: PLR area code in the LOR 2021 scheme (8-digit, zero-padded).
        tests:
          - not_null:
              config:
                where: "reference_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage of the output row. Always 'lor_2021' since all output
          rows are mapped to the 2021 PLR scheme (pre-2021 source rows are crosswalk-
          mapped to 2021 PLR codes, 2021 source rows pass through directly).
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
          - accepted_values:
              arguments:
                values: ["lor_2021"]
              config:
                where: "plr_id_2021 is not null"
      - name: reference_year
        description: Calendar year of the 31-Dec snapshot.
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: reference_date
        description: 31-Dec snapshot date as DATE.
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: indicator
        description: Indicator key from the 13-indicator approved set.
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
          - accepted_values:
              arguments:
                values:
                  - residents_total
                  - residents_male_share
                  - residents_female_share
                  - age_under18_share
                  - age_18_27_share
                  - age_27_45_share
                  - age_45_65_share
                  - age_65plus_share
                  - mean_age_years
                  - foreigners_share
                  - migration_background_share
                  - residence_duration_5y_share
                  - residence_duration_10y_share
              config:
                where: "plr_id_2021 is not null"
      - name: indicator_value
        description: >
          Aggregated weighted indicator value: SUM(source_value * crosswalk_weight)
          per (reference_year, plr_id_2021, indicator). For lor_2021 passthrough rows
          weight=1.0 so value is unchanged. For lor_pre2021 mapped rows, multiple
          contributing PLRs are summed. NULL if all contributing source values were NULL.
      - name: is_suppressed_any
        description: >
          True if any contributing source PLR was statistically suppressed. MAX over
          all contributing pre-2021 PLRs (propagated suppression flag).
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: source_attribution
        description: CC BY 3.0 DE attribution string propagated from stg_berlin_ewr.
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: crosswalk_weight
        description: >
          NULL post-aggregation. Pre-aggregation: weight applied from the crosswalk
          (1.0 for passthrough/identity; fractional for splits). Not meaningful as
          an aggregate value across multiple contributing PLRs.
      - name: crosswalk_type
        description: >
          NULL post-aggregation. Pre-aggregation: 'passthrough' (lor_2021 rows),
          'official_concordance', 'areal_pop_weighted', or 'identity' (from crosswalk).
          Not meaningful as an aggregate value.

  - name: int_poi_status_dynamism
    description: >
      C4/C5 intermediate: per-PLR per-year POI status and dynamism scores.

      status_score: z-score of total_poi_count relative to all PLRs for that year.
      Captures how POI-rich an area is; mirrors the 2018 thesis status_index.

      dynamism_score (C5 normalized, geo-DS approved 2026-06-19): z-score of
      share_yoy_change, where share = plr_poi_count / berlin_total_poi_count per year.
      This controls for OSM completeness-bias: a PLR that gains share disproportionately
      is exhibiting real churn rather than reflecting mapper coverage growth.
      Prior to C5, dynamism was a z-score of raw YoY count deltas (completeness-biased).
      C5 geo-DS sign-off: docs/epic-c/C5-geo-signoff.md (verdict PASS).

      Limitation (C5): the share approach assumes uniform OSM coverage growth across
      PLRs. Non-uniform coverage (some PLRs mapped later than others) may create
      spurious share dynamics. Option B (ohsome edit-density normalization) is available
      for a future epic.

      YoY deltas are computed within (area_code, area_vintage). Because the upstream
      int_poi_share_base_2021 remaps all rows to the lor_2021 scheme before this model
      reads them, the LAG window spans the 2020->2021 boundary and produces non-NULL
      deltas at snapshot_year=2021 (fixes issue #63).

      C5 anomaly checks (implemented as standalone test SQL files, not schema.yml tests,
      because DuckDB does not allow window functions in WHERE clauses):
        - tests/test_c5_poi_share_spike.sql: warn if any PLR share exceeds 2x 5yr avg.
        - tests/test_c5_poi_count_drop.sql: warn if city-wide count drops >5% YoY.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
          config:
            where: "area_code is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, 2008-2026).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code (8-digit, zero-padded). Vintage-specific.
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage. Always 'lor_2021' since int_poi_share_base_2021 remaps
          all pre-2021 PLR codes to their 2021 equivalents before this model reads them.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_2021"]
              config:
                where: "area_code is not null"
      - name: total_poi_count
        description: Total POI count for this PLR in this year (from int_poi_features_pivot).
      - name: berlin_total_poi_count
        description: >
          Sum of total_poi_count across all PLRs for this city and year.
          Used as the denominator for plr_poi_share computation (C5 normalization).
      - name: plr_poi_share
        description: >
          This PLR's fraction of total Berlin POIs for this year:
          plr_poi_share = total_poi_count / berlin_total_poi_count.
          Ranges from 0 to 1; city-wide sum per year = 1.0.
      - name: plr_poi_share_prev_year
        description: >
          plr_poi_share for the prior year (LAG within area_code, area_vintage).
          NULL for the first year of each PLR/vintage combination.
      - name: share_yoy_change
        description: >
          Year-over-year change in plr_poi_share:
          share_yoy_change = plr_poi_share - plr_poi_share_prev_year.
          NULL for the first year per PLR/vintage (no LAG available).
          Positive = PLR gained share relative to Berlin; negative = lost share.
      - name: status_score
        description: >
          Z-score of total_poi_count relative to all PLRs for that year.
          Captures how POI-rich this area is compared to the city-wide average.
          NULL when total_poi_count is NULL or stddev is 0 (< 2 PLRs).
      - name: dynamism_score
        description: >
          C5 normalized: z-score of share_yoy_change relative to all PLRs for
          that year. Positive = this PLR's share grew more than the city average.
          NULL for the first year per PLR/vintage or when stddev is 0.
          Controls OSM completeness-bias vs pre-C5 raw-count-delta z-score.

  - name: int_osm_poi_harmonized
    description: >
      C2 POI taxonomy harmonization view.  Selects from stg_osm_poi and applies
      approved tag-schema drift remapping via seed_poi_tag_drift, resolving each
      POI to its canonical (poi_domain_h, poi_category_h, poi_type_h) triple.
      Canonical classifications are sourced from seed_poi_canonical_category.
      Provenance is recorded in harmonization_provenance so downstream models can
      filter or weight remapped POIs independently.
      Graceful-degradation: returns zero rows when stg_osm_poi has no data
      (no parquet files produced by C1 ingestion); the schema is always present.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - snapshot_year
              - osm_id
          config:
            where: "osm_id is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, e.g. 2018).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: osm_id
        description: OSM node identifier (e.g. 'node/12345678').
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: poi_domain_h
        description: >
          Harmonized POI domain.  COALESCE(canonical_poi_domain, poi_domain).
          Same as poi_domain when no drift rule applies.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_category_h
        description: >
          Harmonized POI category.  COALESCE(canonical_poi_category, poi_category).
          Same as poi_category when no drift rule applies.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_type_h
        description: >
          Harmonized POI type.  COALESCE(canonical_poi_type, poi_type).
          Same as poi_type when no drift rule applies.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: harmonization_provenance
        description: >
          Indicates how the harmonized classification was derived.
          'native'      — no drift rule matched; original classification retained.
          'drift_remap' — matched exactly one drift rule; remapped to canonical.
          'ambiguous'   — matched more than one drift rule (guard; should not occur
                          with the approved seed).
          'unmapped'    — matched a drift rule but canonical seed has no entry for
                          the canonical_key/value pair.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
          - accepted_values:
              arguments:
                values: ["native", "drift_remap", "ambiguous", "unmapped"]
              config:
                where: "osm_id is not null"

  - name: int_osm_poi_plr
    description: >
      C3-join -- Spatial join model that assigns each OSM POI to its PLR area_code
      using the correct LOR vintage geometry (geo-DS approved methodology).
      Vintage assignment: snapshot_year <= 2020 uses pre-2021 PLR geometries
      (448 PLRs); snapshot_year >= 2021 uses LOR 2021 geometries (542 PLRs).
      Spatial predicate: ST_Within (exact point-in-polygon; no buffer).
      Left join: POIs outside all PLRs receive area_code = NULL (known exclusions:
      water bodies, airport perimeter outside PLR boundaries).
      Graceful-degradation: returns zero rows when OSM or LOR parquet files are
      absent so dbt build passes before ingestion is run.
      Materialised as table (spatial join is expensive; avoids recomputation on
      every downstream ref).
      Source: LOR WFS from GDI Berlin, CC BY 3.0 DE.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - snapshot_year
              - osm_id
          config:
            where: "osm_id is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, e.g. 2018).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: osm_id
        description: OSM node identifier (e.g. 'node/12345678').
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_code
        description: >
          PLR area code from spatial join (8-digit, zero-padded). NULL when the
          POI falls outside all PLR boundaries (water bodies, airport perimeter).
        tests:
          - assert_null_rate_below:
              arguments:
                column_name: area_code
                partition_by: snapshot_year
                max_null_fraction: 0.12
              config:
                severity: warn
                where: "snapshot_year is not null"
          - relationships:
              arguments:
                to: ref('dim_area')
                field: area_code
              config:
                severity: warn
                where: "area_code is not null"
      - name: area_vintage
        description: >
          LOR vintage of the geometry used for the spatial join.
          'lor_pre2021' for snapshot_year <= 2020; 'lor_2021' for snapshot_year >= 2021.
        tests:
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: poi_domain_h
        description: >
          Harmonized POI domain (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_domain, poi_domain).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_category_h
        description: >
          Harmonized POI category (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_category, poi_category).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_type_h
        description: >
          Harmonized POI type (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_type, poi_type).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: harmonization_provenance
        description: >
          Provenance of the harmonized classification (from int_osm_poi_harmonized).
          'native', 'drift_remap', 'ambiguous', or 'unmapped'.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"

  - name: int_poi_share_base
    description: >
      C5 helper: pre-materializes PLR POI share per year before dynamism computation.
      DuckDB does not support nested window functions; materializing this as a separate
      table breaks the chain at this boundary.

      Grain: (city_code, snapshot_year, area_code, area_vintage). Contains both
      lor_pre2021 (snapshot_year <= 2020) and lor_2021 (snapshot_year >= 2021) rows
      with vintage-specific PLR codes. Direct consumers should use int_poi_share_base_2021
      (which remaps all rows to the 2021 PLR scheme) unless they need the raw vintage split.

      This model is consumed exclusively by int_poi_share_base_2021.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
              - area_vintage
          config:
            where: "area_code is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, 2008-2026).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code (8-digit, zero-padded). Vintage-specific (pre-2021 or 2021 scheme).
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage: 'lor_pre2021' (snapshot_year <= 2020) or
          'lor_2021' (snapshot_year >= 2021).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: total_poi_count
        description: Total POI count for this PLR in this snapshot year.
      - name: berlin_total_poi_count
        description: Sum of total_poi_count across all PLRs for this city and year.
      - name: plr_poi_share
        description: >
          This PLR's fraction of total Berlin POIs for this year:
          total_poi_count / berlin_total_poi_count. Ranges 0-1; city-wide sum = 1.0.

  - name: int_poi_share_base_2021
    description: >
      Remaps int_poi_share_base to a unified LOR 2021 PLR scheme for all snapshot years.
      Fixes issue #63: before this model, int_poi_status_dynamism read int_poi_share_base
      directly, causing the LAG window (partitioned by area_code + area_vintage) to produce
      NULL at snapshot_year=2021 because pre-2021 rows had different PLR codes and a
      different area_vintage value.

      Crosswalk strategy (mirrors int_berlin_ewr_plr2021):
      - lor_2021 rows (snapshot_year >= 2021): passed through unchanged.
      - lor_pre2021 rows (snapshot_year <= 2020): joined to seed_lor_crosswalk_2006_to_2021;
        total_poi_count (an extensive/count indicator) is apportioned as SUM(count * weight).

      All output rows use area_vintage='lor_2021'. berlin_total_poi_count and plr_poi_share
      are recomputed after aggregation (ratio recomputation is exact for counts).

      Consumed exclusively by int_poi_status_dynamism.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
          config:
            where: "area_code is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code in the LOR 2021 scheme (8-digit, zero-padded).
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage. Always 'lor_2021': pre-2021 source rows are crosswalk-mapped
          to 2021 PLR codes; 2021+ source rows pass through directly.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_2021"]
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, 2008-2026).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: total_poi_count
        description: >
          Aggregated total POI count for this 2021 PLR in this year.
          For lor_2021 passthrough rows: same as int_poi_share_base.
          For lor_pre2021 remapped rows: SUM(source_count * crosswalk_weight) across all
          pre-2021 PLRs that map to this 2021 PLR (exact for count/extensive data).
      - name: berlin_total_poi_count
        description: >
          Sum of total_poi_count across all 2021 PLRs for this city and year.
          City-wide total is invariant to PLR boundary remapping (same city, same POIs).
      - name: plr_poi_share
        description: >
          This 2021 PLR's fraction of total Berlin POIs for this year:
          total_poi_count / berlin_total_poi_count. Recomputed after aggregation.
          Ranges 0-1; city-wide sum per year = 1.0.

  - name: int_gentrification_ts
    description: >
      R-A1 re-grounded time-series panel (#64): combines D3 predictors (POI), D1/D2 MSS
      social outcomes, and D4 EWR baseline covariate. One row per PLR per MSS edition year
      where POI data also exists (same-year join: snapshot_year = MSS edition year).

      ADR-0008 architectural fix: the pre-R-A1 model averaged predictors and outcomes into
      a single gentrification_score (no theoretical grounding). R-A1 separates the dimensions:
        D1 = status_index (1=hoch … 4=sehr_niedrig) — social STATUS outcome
        D2 = dynamik_index (1=positiv, 2=stabil, 3=negativ) — social DIRECTION outcome
        D3 = status_score / dynamism_score (C5-corrected POI z-scores) — commercial PREDICTOR
        D4 = ewr_composite (5-indicator z-score mean) — demographic BASELINE COVARIATE

      D1 POLARITY: 1=hoch (low deprivation) … 4=sehr_niedrig (most deprived). INVERSE numeric
      vs 2018 thesis status_summe but SAME deprivation gradient. See SQL model for full note.

      D4 BASELINE DISCIPLINE: D4 enters ONLY as a cross-sectional LEVEL. D4 changes are
      near-tautological outcome proxies (Döring & Ulbricht 2016) and are EXCLUDED.

      Uninhabited PLRs (gesamtindex IS NULL): retained with is_uninhabited=true but MUST be
      excluded from all regression, lead-lag, and metric computation (§7.1; R-A3 C3).

      legacy_gentrification_score: the pre-R-A1 formula kept for 2018 baseline comparison only.
      NOT for new analysis.

      Grain: (city_code, area_code, area_vintage, snapshot_year) per MSS edition.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - area_vintage
              - snapshot_year
          config:
            where: "area_code is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md): the
      # re-grounded panel is empty whenever MSS/POI/EWR are missing on a machine.
      - assert_not_empty:
          config:
            severity: error
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: >
          MSS edition year (biennial: 2013, 2015, 2017, 2019, 2021, 2023, 2025).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code (8-digit, zero-padded).
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR boundary vintage from stg_berlin_mss: 'lor_pre2021' (edition ≤2019)
          or 'lor_2021' (edition ≥2021). Follows the native MSS vintage.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: total_poi_count
        description: Total POI count for this PLR in this year (D3 density; C5 source).
      - name: share_yoy_change
        description: >
          C5 normalized: year-over-year change in PLR POI share (D3 dynamism face; §2.4).
          NULL for the first year per PLR/vintage.
      - name: status_score
        description: >
          D3 predictor: z-score of total_poi_count relative to all PLRs for that year.
          POI density face; PREDICTOR not outcome (R-A1; ADR-0008).
      - name: dynamism_score
        description: >
          D3 predictor: C5-corrected z-score of share_yoy_change. Commercial succession signal.
          PREDICTOR not outcome. C5 geo-DS sign-off: PASS (docs/epic-c/C5-geo-signoff.md).
      - name: status_index
        description: >
          D1 outcome: MSS Social Status ordinal class. 1=hoch (high status, low deprivation) …
          4=sehr_niedrig (lowest status, most deprived). NULL = uninhabited PLR.
          POLARITY: INVERSE numeric vs 2018 thesis status_summe; same deprivation gradient.
          Treat as ORDINAL — never metric-average (R-A3 C2; index-definition.md §3).
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
              config:
                where: "status_index is not null"
      - name: dynamik_index
        description: >
          D2 outcome: MSS Dynamik (social change direction) ordinal class.
          1=positiv (improving), 2=stabil, 3=negativ (worsening). NULL = uninhabited PLR.
          Already vulnerability-positive in numeric order (3=worsening=most vulnerable).
          Mapped from WFS di_n {1,3,5} → {1,2,3} in stg_berlin_mss.
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3]
              config:
                where: "dynamik_index is not null"
      - name: gesamtindex
        description: >
          MSS 12-group composite code (tens digit=status, units digit=Dynamik WFS code {1,3,5}).
          Valid codes: {11,13,15,21,23,25,31,33,35,41,43,45}. NULL = uninhabited PLR.
          Do NOT treat as a 12-level metric ordinal (index-definition.md §1.7).
      - name: mss_edition
        description: >
          MSS publication year (biennial: 2013, 2015, 2017, 2019, 2021, 2023, 2025).
          Identical to snapshot_year in this model; retained for explicit temporal alignment.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: is_uninhabited
        description: >
          True if this PLR is uninhabited (gesamtindex IS NULL in MSS; WFS sentinel −9999 → null).
          Uninhabited PLRs MUST be excluded from all regression, lead-lag, and metric computation
          (index-definition.md §7.1; R-A3 C3). Retained here for completeness (row count reporting).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: typology_stage
        description: >
          Typology stage derived from the D1×D2 MSS Status × Dynamik matrix (ADR-0008;
          index-definition.md §1.5). One of: 'stable-established', 'pre-gentrification',
          'pioneer-signal', 'active-gentrification', 'consolidation-pressure',
          'improving-vulnerable'. NULL for uninhabited PLRs.
          PLR-level aggregate — not an individual/building-level statement (G-2 guardrail).
          D-2 sign guard: upgrading stages require non-negativ Dynamik (dynamik_index IN (1,2))
          as a necessary condition; dynamik_index=3 can NEVER yield an upgrading stage.
        tests:
          - accepted_values:
              arguments:
                values:
                  - stable-established
                  - pre-gentrification
                  - pioneer-signal
                  - active-gentrification
                  - consolidation-pressure
                  - improving-vulnerable
              config:
                where: "typology_stage is not null"
      - name: ewr_composite
        description: >
          D4 baseline covariate: mean of 5 EWR indicator z-scores. Higher = more
          socio-economically vulnerable population. All inputs are vulnerability-positive.
          Enters the model ONLY as a cross-sectional LEVEL (§4.3, binding).
          NULL when any key indicator is suppressed or absent.
      - name: foreigners_share
        description: D4 component (foreigners share; vulnerability-positive baseline level).
      - name: age_under18_share
        description: D4 component (share of residents under 18; vulnerability-positive baseline).
      - name: migration_background_share
        description: >
          D4 component: share with migration background (vulnerability-positive; ≥2017 only
          due to Mikrozensus definition break — do not compare pre/post-2017; §4.4).
      - name: mean_age_years
        description: D4 component (mean age in years; vulnerability-positive; negation removed PR #89).
      - name: residence_duration_5y_share
        description: >
          D4 component: share resident ≤5 years (vulnerability-positive; high tenure = settled
          pre-gentrification population per Döring & Ulbricht 2016).
      - name: residents_total
        description: Total residents in this PLR for this year (from EWR; for population weighting).
      - name: legacy_gentrification_score
        description: >
          Pre-R-A1 formula kept for 2018 baseline comparison ONLY.
          = (status_score + dynamism_score - ewr_composite) / 3.0
          This formula averaged predictors and outcomes with no theoretical grounding.
          DO NOT use for new analysis. Refer to D1/D2 columns for outcome analysis
          and D3 columns for predictor analysis (R-A1; ADR-0008).

  - name: int_mss_lead_lag
    description: >
      R-A1 lead-lag validation model (#64): primary analysis table for the thesis's temporal
      order finding. Tests whether POI commercial activity at t predicts MSS social status
      change at t+k (H3a, rejected in thesis) or vice versa (H3b, confirmed in thesis).

      Theory: Dangschat (1988) double invasion-succession cycle — social cycle LEADS commercial
      cycle. H3b confirmed / H3a rejected in thesis (p. 91, p. 55–56).

      Grain: one row per (city_code, area_code, area_vintage, edition_t, lag_k).
      lag_k ∈ {1, 2, 3} — MSS edition steps (each = 2 years; MSS is biennial).

      Exclusions applied:
        - is_uninhabited = true PLRs excluded from both base and lagged row (§7.1).
        - Cross-vintage deltas blocked: area_vintage must match between base and lagged row.
        - Only rows where the lagged outcome (status_index_tk) exists are retained.

      D4 discipline: ewr_composite_t is the ONLY D4 column (level at time t as baseline
      covariate). No D4 delta columns — D4 changes are near-tautological outcome proxies.

      C5 correction: dynamism_score (C5-corrected) is used throughout, never raw count deltas.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - area_vintage
              - edition_t
              - lag_k
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "delta_status_ordinal between -3 and 3"
          config:
            where: "delta_status_ordinal is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md):
      - assert_not_empty:
          config:
            severity: error
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null
      - name: area_code
        description: PLR area code (8-digit, zero-padded).
        tests:
          - not_null
      - name: area_vintage
        description: >
          LOR boundary vintage. 'lor_pre2021' (editions ≤2019) or 'lor_2021' (editions ≥2021).
          Both base and lagged row must share the same vintage (vintage guard, binding).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
      - name: edition_t
        description: Base MSS edition year (time t; the predictor side).
        tests:
          - not_null
      - name: lag_k
        description: >
          MSS edition offset (1, 2, or 3 steps; each step = 2 years).
          edition_tk = edition_t + lag_k * 2.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
      - name: edition_tk
        description: Outcome MSS edition year (time t+k; edition_t + lag_k * 2).
        tests:
          - not_null
      - name: status_index_t
        description: >
          D1 MSS social status at time t (ordinal 1–4; 1=hoch best, 4=sehr_niedrig worst).
          Predictor side for H3a; baseline for H3b.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
      - name: dynamik_index_t
        description: >
          D2 MSS Dynamik at time t (ordinal 1–3; 1=positiv, 2=stabil, 3=negativ).
          Encodes the 2-year status change direction as a ready-made Δstatus proxy (thesis p. 97).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
      - name: typology_stage_t
        description: Typology stage at time t (from D1×D2 matrix; index-definition.md §1.5).
      - name: status_index_tk
        description: >
          D1 MSS social status at time t+k (outcome for H3a; ordinal 1–4).
          Only present rows where this exists (inner join on lag).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
      - name: dynamik_index_tk
        description: D2 MSS Dynamik at time t+k (outcome direction; ordinal 1–3).
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3]
              config:
                where: "dynamik_index_tk is not null"
      - name: delta_status_ordinal
        description: >
          status_index_tk - status_index_t. ORDINAL transition; do NOT treat as metric.
          Positive = status worsened (more deprived). Negative = status improved (less deprived).
          Range: -3 to +3 (bounded by the 4-class ordinal scale).
          D1 POLARITY: lower numeric = higher status = LESS deprived (INVERSE of thesis status_summe).
      - name: status_transition
        description: >
          Ordinal transition direction: 'improved' (status_index fell), 'stable' (unchanged),
          'worsened' (status_index rose). For use in ordered-logit / ordinal regression (§3.2).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["improved", "stable", "worsened"]
      - name: dynamism_score_t
        description: >
          D3 C5-corrected dynamism score at time t (z-score of share_yoy_change).
          Commercial succession signal; PREDICTOR for H3a (amenity at t → status at t+k).
      - name: delta_dynamism_t
        description: >
          Change in D3 dynamism_score at t vs t-1 (within-vintage LAG).
          Predictor for H3b: Δamenity_{t} vs Δstatus_{t+k} (§2.2; both sides must be deltas).
          C5-corrected; NULL for first MSS edition in vintage.
      - name: dynamism_score_tk
        description: >
          D3 C5-corrected dynamism score at time t+k.
          Outcome for H3b: Δstatus_{t} → Δamenity_{t+k} (Dangschat social-leads-commercial).
      - name: ewr_composite_t
        description: >
          D4 baseline vulnerability covariate at time t (cross-sectional LEVEL only; §4.3).
          Higher = more socio-economically vulnerable. NO D4 delta columns in this model.
      - name: is_pre2021_vintage
        description: >
          True if area_vintage = 'lor_pre2021' (the 447-PLR series; thesis universe; longest
          MSS time series). Epic B headline analysis uses this series (index-definition.md §6.2).
