version: 2

models:
  - name: int_thesis_2018_area_index
    description: >
      Conformed union of all three 2018 thesis golden staging models (bzr standard,
      plr standard, plr distance_weighted). Normalises column names to the shared
      mart schema. This is the single source of truth for the 2018 thesis index
      within the Gentriduck warehouse and is used directly by the gentrification_index
      mart. When Epic B3/C ingestion lands, this model is replaced/extended with
      computed values; until then it serves as the directional baseline per the
      Epic B strategy (docs/epic-b/B0-input-inventory.md).
      All German data values are translated to English by the upstream staging models.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER' from the thesis goldens.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_level
        description: Area level identifier. Values from seed_dim_area_level.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: area_code
        description: Area code (raum_id from the thesis golden).
        tests:
          - not_null
      - name: area_name
        description: Area name (raum_desc; German proper noun; latin-1 decoded).
        tests:
          - not_null
      - name: period_yyyymm
        description: Reporting period as string YYYYMM (e.g. '201612').
        tests:
          - not_null
      - name: variant
        description: >
          Index variant discriminator. 'standard' uses non-distance-weighted POI
          features; 'distance_weighted' uses the POI inverse-distance weighting
          from the 2018 thesis Java UDF (to be reproduced in DuckDB ST_Distance/
          ST_DWithin in Epic B3/C).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["standard", "distance_weighted"]
      - name: status_class_bi
        description: >
          Projected status class (binary English label; high/medium/low).
          high = low deprivation / high POI status score.
          low = high deprivation / low POI status score.
          See B5-findings-check.md for the label polarity explanation.
        tests:
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
      - name: dynamism_class_bi
        description: >
          Projected dynamism class (binary English label; positive/neutral/negative).
          positive = high gentrification pressure / above-average POI churn.
          negative = low gentrification pressure / below-average POI churn.
        tests:
          - accepted_values:
              arguments:
                values: ["positive", "neutral", "negative"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_level
              - area_code
              - period_yyyymm
              - variant

  - name: dim_city
    description: >
      Conformed city dimension (ADR-0005 city-agnostic seam). One row per city.
      Currently Berlin only (BER). Sourced from seed_dim_city. Multi-city expansion
      (Epic H) adds a new seed row + adapter without changing this model or any mart.
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: city_code
        description: Short city identifier (e.g. 'BER'). Natural key.
        tests:
          - not_null
          - unique
      - name: city_name
        description: Human-readable city name (e.g. 'Berlin').
        tests:
          - not_null
      - name: country_code
        description: ISO 3166-1 alpha-2 country code (e.g. 'DE').
        tests:
          - not_null

  - name: dim_area
    description: >
      Conformed area dimension (ADR-0005 city-agnostic seam). Distinct
      (city_code, area_level, area_code, area_name) from int_thesis_2018_area_index
      + stg_berlin_lor + stg_hamburg_geo (#40 H1, ADR-0014), joined with
      seed_dim_area_level for level_name.
      NOTE: parent_area_code is intentionally omitted until stg_berlin_lor is
      populated (Epic B2/C). When the LOR geometry ingestion lands, add the parent
      crosswalk via a join on (city_code, area_code, area_level). See model SQL for
      details.
      Area names are proper nouns kept in their local language (German for both
      Berlin and Hamburg).
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: city_code
        description: City identifier (FK -> dim_city).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_city')
                field: city_code
      - name: area_level
        description: >
          Area level identifier. Berlin uses 'bezirk'/'bzr'/'plr'; Hamburg
          (#40 H1, ADR-0014) uses the generic 'district'/'subarea_l1'/'subarea_l2'
          levels (see seed_dim_area_level).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  ["bezirk", "bzr", "plr", "district", "subarea_l1", "subarea_l2"]
      - name: area_code
        description: Area code. Natural key within (city_code, area_level).
        tests:
          - not_null
      - name: area_name
        description: Area name (German proper noun; Berlin or Hamburg place names).
        tests:
          - not_null
      - name: level_name
        description: Human-readable level name from seed_dim_area_level.

  - name: int_ewr_series
    description: >
      EWR socio-economic time series joined to the conformed area dimension
      (ADR-0005). Selects from stg_berlin_ewr (long-format, PLR grain,
      13 indicators) and inner-joins dim_area to attach area metadata.
      Graceful-degradation: returns zero rows when stg_berlin_ewr has no data
      (ingestion not yet run) OR when dim_area does not yet include PLR rows
      with city_code='berlin' (stg_berlin_lor stub). Both conditions must be
      met for rows to appear; zero rows is correct at this stage.
      One output row = one indicator for one PLR area for one reference year.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - reference_year
              - indicator
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "indicator_value between 0 and 1"
          config:
            where: "area_code is not null and indicator not in ('residents_total', 'mean_age_years') and indicator_value is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER' (normalized from 'berlin' at stg_berlin_ewr staging boundary).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR identifier (zero-padded to 8 chars). FK -> dim_area.area_code.
        tests:
          - not_null:
              config:
                where: "reference_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage: 'lor_pre2021' (reference_year <= 2020) or
          'lor_2021' (reference_year >= 2021).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: reference_year
        description: Calendar year of the 31-Dec snapshot (integer, 2008-2024).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: reference_date
        description: 31-Dec snapshot date as DATE (e.g. 2018-12-31).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: indicator
        description: >
          Indicator key from the 13-indicator approved set
          (see seed_ewr_indicator_meta for definitions).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values:
                  - residents_total
                  - residents_male_share
                  - residents_female_share
                  - age_under18_share
                  - age_18_27_share
                  - age_27_45_share
                  - age_45_65_share
                  - age_65plus_share
                  - mean_age_years
                  - foreigners_share
                  - migration_background_share
                  - residence_duration_5y_share
                  - residence_duration_10y_share
              config:
                where: "area_code is not null"
      - name: indicator_value
        description: >
          Computed indicator value. Shares in [0, 1]; residents_total is a count;
          mean_age_years in decimal years. May be NULL where source column absent.
      - name: source_attribution
        description: CC BY 3.0 DE attribution string from the EWR source.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_name
        description: Area name from dim_area (German proper noun; Berlin place names).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_level
        description: Area level from dim_area (e.g. 'plr').
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: level_name
        description: Human-readable level name from dim_area / seed_dim_area_level.

  - name: int_berlin_ewr_plr2021
    description: >
      Aligns the EWR socio-economic time series to the unified LOR 2021 PLR scheme.
      Rows with area_vintage='lor_2021' (reference_year >= 2021) are passed through
      directly. Rows with area_vintage='lor_pre2021' (reference_year <= 2020) are
      joined to seed_lor_crosswalk_2006_to_2021 and indicator_value is weighted by
      the crosswalk weight (1.0 for 1:1 maps, fractional for splits).

      When multiple pre-2021 PLRs contribute to the same 2021 PLR, indicator values
      are aggregated as SUM(value * weight) per (reference_year, plr_id_2021, indicator).
      For extensive indicators (counts): exact. For intensive indicators (rates/shares):
      approximates a population-weighted average under uniform-population-within-PLR
      assumption (standard practice at the Berlin PLR spatial scale).

      Status (as of 2026-06-19): seed_lor_crosswalk_2006_to_2021 is POPULATED with
      3055 areal_pop_weighted rows from GDI Berlin WFS geometries (EPSG:25833) via
      ingestion/berlin/lor/ingest_lor_crosswalk.py. Geo-DS approved 2026-06-19
      (docs/epic-c/C3-crosswalk-geo-signoff.md, verdict PASS). Both pre-2021 and
      2021 rows now produce output; the 2020->2021 vintage boundary is bridged.

      All output rows use area_vintage='lor_2021' (they are all in the 2021 PLR scheme).
      crosswalk_weight and crosswalk_type are NULL post-aggregation (not meaningful).

      Known breaks (inherited):
        - LOR 2021 reform: resolved by this model for aligned analysis.
        - Migrationshintergrund ~2017: see seed_ewr_indicator_meta (stable_from_year=2017).
          This model does not filter; consumers should apply reference_year >= 2017
          for migration_background_share.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - plr_id_2021
              - indicator
          config:
            where: "plr_id_2021 is not null"
    columns:
      - name: city_code
        description: City identifier; always 'BER' (ADR-0005; normalized at stg_berlin_ewr staging boundary).
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: plr_id_2021
        description: PLR area code in the LOR 2021 scheme (8-digit, zero-padded).
        tests:
          - not_null:
              config:
                where: "reference_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage of the output row. Always 'lor_2021' since all output
          rows are mapped to the 2021 PLR scheme (pre-2021 source rows are crosswalk-
          mapped to 2021 PLR codes, 2021 source rows pass through directly).
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
          - accepted_values:
              arguments:
                values: ["lor_2021"]
              config:
                where: "plr_id_2021 is not null"
      - name: reference_year
        description: Calendar year of the 31-Dec snapshot.
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: reference_date
        description: 31-Dec snapshot date as DATE.
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: indicator
        description: Indicator key from the 13-indicator approved set.
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
          - accepted_values:
              arguments:
                values:
                  - residents_total
                  - residents_male_share
                  - residents_female_share
                  - age_under18_share
                  - age_18_27_share
                  - age_27_45_share
                  - age_45_65_share
                  - age_65plus_share
                  - mean_age_years
                  - foreigners_share
                  - migration_background_share
                  - residence_duration_5y_share
                  - residence_duration_10y_share
              config:
                where: "plr_id_2021 is not null"
      - name: indicator_value
        description: >
          Aggregated weighted indicator value: SUM(source_value * crosswalk_weight)
          per (reference_year, plr_id_2021, indicator). For lor_2021 passthrough rows
          weight=1.0 so value is unchanged. For lor_pre2021 mapped rows, multiple
          contributing PLRs are summed. NULL if all contributing source values were NULL.
      - name: is_suppressed_any
        description: >
          True if any contributing source PLR was statistically suppressed. MAX over
          all contributing pre-2021 PLRs (propagated suppression flag).
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: source_attribution
        description: CC BY 3.0 DE attribution string propagated from stg_berlin_ewr.
        tests:
          - not_null:
              config:
                where: "plr_id_2021 is not null"
      - name: crosswalk_weight
        description: >
          NULL post-aggregation. Pre-aggregation: weight applied from the crosswalk
          (1.0 for passthrough/identity; fractional for splits). Not meaningful as
          an aggregate value across multiple contributing PLRs.
      - name: crosswalk_type
        description: >
          NULL post-aggregation. Pre-aggregation: 'passthrough' (lor_2021 rows),
          'official_concordance', 'areal_pop_weighted', or 'identity' (from crosswalk).
          Not meaningful as an aggregate value.

  - name: int_poi_status_dynamism
    description: >
      C4/C5 intermediate: per-PLR per-year POI status and dynamism scores.

      status_score: z-score of total_poi_count relative to all PLRs for that year.
      Captures how POI-rich an area is; mirrors the 2018 thesis status_index.

      dynamism_score (C5 normalized, geo-DS approved 2026-06-19): z-score of
      share_yoy_change, where share = plr_poi_count / berlin_total_poi_count per year.
      This controls for OSM completeness-bias: a PLR that gains share disproportionately
      is exhibiting real churn rather than reflecting mapper coverage growth.
      Prior to C5, dynamism was a z-score of raw YoY count deltas (completeness-biased).
      C5 geo-DS sign-off: docs/epic-c/C5-geo-signoff.md (verdict PASS).

      Limitation (C5): the share approach assumes uniform OSM coverage growth across
      PLRs. Non-uniform coverage (some PLRs mapped later than others) may create
      spurious share dynamics. Option B (ohsome edit-density normalization) is available
      for a future epic.

      YoY deltas are computed within (area_code, area_vintage). Because the upstream
      int_poi_share_base_2021 remaps all rows to the lor_2021 scheme before this model
      reads them, the LAG window spans the 2020->2021 boundary and produces non-NULL
      deltas at snapshot_year=2021 (fixes issue #63).

      C5 anomaly checks (implemented as standalone test SQL files, not schema.yml tests,
      because DuckDB does not allow window functions in WHERE clauses):
        - tests/test_c5_poi_share_spike.sql: warn if any PLR share exceeds 2x 5yr avg.
        - tests/test_c5_poi_count_drop.sql: warn if city-wide count drops >5% YoY.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
          config:
            where: "area_code is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, 2008-2026).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code (8-digit, zero-padded). Vintage-specific.
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage. Always 'lor_2021' since int_poi_share_base_2021 remaps
          all pre-2021 PLR codes to their 2021 equivalents before this model reads them.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_2021"]
              config:
                where: "area_code is not null"
      - name: total_poi_count
        description: Total POI count for this PLR in this year (from int_poi_features_pivot).
      - name: berlin_total_poi_count
        description: >
          Sum of total_poi_count across all PLRs for this city and year.
          Used as the denominator for plr_poi_share computation (C5 normalization).
      - name: plr_poi_share
        description: >
          This PLR's fraction of total Berlin POIs for this year:
          plr_poi_share = total_poi_count / berlin_total_poi_count.
          Ranges from 0 to 1; city-wide sum per year = 1.0.
      - name: plr_poi_share_prev_year
        description: >
          plr_poi_share for the prior year (LAG within area_code, area_vintage).
          NULL for the first year of each PLR/vintage combination.
      - name: share_yoy_change
        description: >
          Year-over-year change in plr_poi_share:
          share_yoy_change = plr_poi_share - plr_poi_share_prev_year.
          NULL for the first year per PLR/vintage (no LAG available).
          Positive = PLR gained share relative to Berlin; negative = lost share.
      - name: status_score
        description: >
          Z-score of total_poi_count relative to all PLRs for that year.
          Captures how POI-rich this area is compared to the city-wide average.
          NULL when total_poi_count is NULL or stddev is 0 (< 2 PLRs).
      - name: dynamism_score
        description: >
          C5 normalized: z-score of share_yoy_change relative to all PLRs for
          that year. Positive = this PLR's share grew more than the city average.
          NULL for the first year per PLR/vintage or when stddev is 0.
          Controls OSM completeness-bias vs pre-C5 raw-count-delta z-score.

  - name: int_poi_status_dynamism_pre2021
    description: >
      B7 (#117): POI status and dynamism scores for the lor_pre2021 PLR system (448 PLRs,
      2008-2020). Mirrors int_poi_status_dynamism but stays in the lor_pre2021 coordinate
      system, bypassing the crosswalk in int_poi_share_base_2021.

      Enables int_gentrification_ts to produce thesis-era rows (MSS 2015/2017/2019) with
      POI predictors in the same PLR boundary system as the MSS outcomes.

      Z-scores are normalised within the lor_pre2021 PLR population for each snapshot_year
      (matching the thesis computation which ran on ~447 lor_pre2021 PLRs). NOT directly
      comparable to int_poi_status_dynamism z-scores (different reference population).
      Cross-vintage z-score comparison is prohibited; int_mss_lead_lag enforces
      within-vintage lag via the area_vintage constraint.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
          config:
            where: "area_code is not null"
      - assert_not_empty:
          config:
            severity: error
    columns:
      - name: city_code
        tests:
          - not_null
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, 2008-2020 for lor_pre2021).
        tests:
          - not_null
      - name: area_code
        description: PLR identifier in the lor_pre2021 system (8-digit, zero-padded).
        tests:
          - not_null
      - name: area_vintage
        description: Always 'lor_pre2021' for this model.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["lor_pre2021"]

  - name: int_ewr_socioeco_pre2021
    description: >
      B7 (#117): EWR socio-economic composite for the lor_pre2021 PLR system (2008-2020).
      Mirrors int_ewr_socioeco but reads directly from stg_berlin_ewr (lor_pre2021 rows),
      bypassing the crosswalk in int_berlin_ewr_plr2021. Preserves lor_pre2021 area codes.

      Key indicators (Thesis §3.1; EWR codebook): foreigners_share, age_under18_share,
      migration_background_share (NULL pre-2014), mean_age_years, residence_duration_5y_share.
      ewr_composite = mean of 5 z-scores; NULL when any key indicator is suppressed or absent
      (migration_background_share absent pre-2014 → ewr_composite NULL pre-2014).

      Z-scores normalised within the lor_pre2021 PLR population per year. NOT directly
      comparable to int_ewr_socioeco (lor_2021 reference population, 542 PLRs).
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - area_vintage
              - reference_year
          config:
            where: "area_code is not null"
      - assert_not_empty:
          config:
            severity: error
    columns:
      - name: city_code
        tests:
          - not_null
      - name: area_code
        description: PLR identifier in the lor_pre2021 system (8-digit, zero-padded).
        tests:
          - not_null
      - name: area_vintage
        description: Always 'lor_pre2021' for this model.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["lor_pre2021"]
      - name: reference_year
        description: EWR reference year (2008-2020 for lor_pre2021 data).
        tests:
          - not_null
      - name: ewr_composite
        description: >
          Mean of 5 z-scores (foreigners, under-18, migration-background, mean-age,
          residence-duration). NULL pre-2014 (migration_background_share absent).

  - name: int_osm_poi_harmonized
    description: >
      C2 POI taxonomy harmonization view.  Selects from stg_osm_poi and applies
      approved tag-schema drift remapping via seed_poi_tag_drift, resolving each
      POI to its canonical (poi_domain_h, poi_category_h, poi_type_h) triple.
      Canonical classifications are sourced from seed_poi_canonical_category.
      Provenance is recorded in harmonization_provenance so downstream models can
      filter or weight remapped POIs independently.
      Graceful-degradation: returns zero rows when stg_osm_poi has no data
      (no parquet files produced by C1 ingestion); the schema is always present.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - snapshot_year
              - osm_id
          config:
            where: "osm_id is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, e.g. 2018).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: osm_id
        description: OSM node identifier (e.g. 'node/12345678').
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: poi_domain_h
        description: >
          Harmonized POI domain.  COALESCE(canonical_poi_domain, poi_domain).
          Same as poi_domain when no drift rule applies.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_category_h
        description: >
          Harmonized POI category.  COALESCE(canonical_poi_category, poi_category).
          Same as poi_category when no drift rule applies.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_type_h
        description: >
          Harmonized POI type.  COALESCE(canonical_poi_type, poi_type).
          Same as poi_type when no drift rule applies.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: harmonization_provenance
        description: >
          Indicates how the harmonized classification was derived.
          'native'      — no drift rule matched; original classification retained.
          'drift_remap' — matched exactly one drift rule; remapped to canonical.
          'ambiguous'   — matched more than one drift rule (guard; should not occur
                          with the approved seed).
          'unmapped'    — matched a drift rule but canonical seed has no entry for
                          the canonical_key/value pair.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
          - accepted_values:
              arguments:
                values: ["native", "drift_remap", "ambiguous", "unmapped"]
              config:
                where: "osm_id is not null"

  - name: int_osm_poi_plr
    description: >
      C3-join -- Spatial join model that assigns each OSM POI to its PLR area_code
      using the correct LOR vintage geometry (geo-DS approved methodology).
      Vintage assignment: snapshot_year <= 2020 uses pre-2021 PLR geometries
      (448 PLRs); snapshot_year >= 2021 uses LOR 2021 geometries (542 PLRs).
      Spatial predicate: ST_Within (exact point-in-polygon; no buffer).
      Left join: POIs outside all PLRs receive area_code = NULL (known exclusions:
      water bodies, airport perimeter outside PLR boundaries).
      Graceful-degradation: returns zero rows when OSM or LOR parquet files are
      absent so dbt build passes before ingestion is run.
      Materialised as table (spatial join is expensive; avoids recomputation on
      every downstream ref).
      Source: LOR WFS from GDI Berlin, CC BY 3.0 DE.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - snapshot_year
              - osm_id
          config:
            where: "osm_id is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, e.g. 2018).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: osm_id
        description: OSM node identifier (e.g. 'node/12345678').
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_code
        description: >
          PLR area code from spatial join (8-digit, zero-padded). NULL when the
          POI falls outside all PLR boundaries (water bodies, airport perimeter).
        tests:
          - assert_null_rate_below:
              arguments:
                column_name: area_code
                partition_by: snapshot_year
                max_null_fraction: 0.12
              config:
                severity: warn
                where: "snapshot_year is not null"
          - relationships:
              arguments:
                to: ref('dim_area')
                field: area_code
              config:
                severity: warn
                where: "area_code is not null"
      - name: area_vintage
        description: >
          LOR vintage of the geometry used for the spatial join.
          'lor_pre2021' for snapshot_year <= 2020; 'lor_2021' for snapshot_year >= 2021.
        tests:
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: poi_domain_h
        description: >
          Harmonized POI domain (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_domain, poi_domain).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_category_h
        description: >
          Harmonized POI category (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_category, poi_category).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_type_h
        description: >
          Harmonized POI type (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_type, poi_type).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: harmonization_provenance
        description: >
          Provenance of the harmonized classification (from int_osm_poi_harmonized).
          'native', 'drift_remap', 'ambiguous', or 'unmapped'.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"

  - name: int_osm_poi_hamburg
    description: >
      H1 (#40) -- Spatial join model that assigns each Hamburg OSM POI to its
      statistisches-Gebiet area_code (Hamburg's PLR-analogue, ADR-0014 Pillar
      1's finest grain, subarea_l2). Mirrors int_osm_poi_plr's design for the
      Hamburg city scope (ADR-0014 Pillar 6: OSM sourcing needs "no new
      adapter mechanics, only passing Hamburg's polygons instead of Berlin's
      PLR polygons"). Single-vintage join ('current' live WFS edition) -- no
      pre2021/2021-style vintage-cutoff branch, since only one Hamburg
      geometry vintage exists yet (ADR-0014 open question #2, deferred).
      Spatial predicate: ST_Within in EPSG:25832 (Hamburg's native CRS, NOT
      Berlin's EPSG:25833) -- first OSM-POI exercise of the ADR-0005 per-city
      CRS parameter. Left join: POIs outside all Gebiete receive
      area_code = NULL (water bodies, airport perimeter, out-of-city-limits
      bbox spillover).
      Graceful-degradation: returns zero rows when Hamburg OSM or geometry
      parquet files are absent so dbt build passes before ingestion is run.
      Materialised as table (spatial join is expensive; avoids recomputation
      on every downstream ref).
      Not methodology-bearing: reuses the already-approved ST_Within
      predicate (Epic C3-join) against a new city's geometry/POI pair.
      Source: LGV Hamburg WFS (dl-de/by-2.0) + Geofabrik .osh.pbf (ODbL).
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - snapshot_year
              - osm_id
          config:
            where: "osm_id is not null"
    columns:
      - name: city_code
        description: City identifier; always 'HH' (ADR-0005 canonical, ADR-0014).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
          - accepted_values:
              arguments:
                values: ["HH"]
              config:
                where: "osm_id is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, e.g. 2018).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: osm_id
        description: OSM node identifier (e.g. 'node/12345678').
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_code
        description: >
          statistisches-Gebiet area code from spatial join. NULL when the POI
          falls outside all Gebiet boundaries (water bodies, airport
          perimeter, bbox spillover into neighbouring states).
        tests:
          - assert_null_rate_below:
              arguments:
                column_name: area_code
                partition_by: snapshot_year
                max_null_fraction: 0.12
              config:
                severity: warn
                where: "snapshot_year is not null"
          - relationships:
              arguments:
                to: ref('dim_area')
                field: area_code
              config:
                severity: warn
                where: "area_code is not null"
      - name: area_vintage
        description: >
          Hamburg geometry vintage used for the spatial join. 'current' for
          this first slice (single live-WFS edition; see ADR-0014 open
          question #2 on the deferred historical crosswalk).
        tests:
          - accepted_values:
              arguments:
                values: ["current"]
              config:
                where: "area_code is not null"
      - name: poi_domain_h
        description: >
          Harmonized POI domain (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_domain, poi_domain).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_category_h
        description: >
          Harmonized POI category (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_category, poi_category).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: poi_type_h
        description: >
          Harmonized POI type (from int_osm_poi_harmonized).
          COALESCE(canonical_poi_type, poi_type).
        tests:
          - not_null:
              config:
                where: "osm_id is not null"
      - name: harmonization_provenance
        description: >
          Provenance of the harmonized classification (from int_osm_poi_harmonized).
          'native', 'drift_remap', 'ambiguous', or 'unmapped'.
        tests:
          - not_null:
              config:
                where: "osm_id is not null"

  - name: int_poi_share_base
    description: >
      C5 helper: pre-materializes PLR POI share per year before dynamism computation.
      DuckDB does not support nested window functions; materializing this as a separate
      table breaks the chain at this boundary.

      Grain: (city_code, snapshot_year, area_code, area_vintage). Contains both
      lor_pre2021 (snapshot_year <= 2020) and lor_2021 (snapshot_year >= 2021) rows
      with vintage-specific PLR codes. Direct consumers should use int_poi_share_base_2021
      (which remaps all rows to the 2021 PLR scheme) unless they need the raw vintage split.

      This model is consumed exclusively by int_poi_share_base_2021.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
              - area_vintage
          config:
            where: "area_code is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, 2008-2026).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code (8-digit, zero-padded). Vintage-specific (pre-2021 or 2021 scheme).
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage: 'lor_pre2021' (snapshot_year <= 2020) or
          'lor_2021' (snapshot_year >= 2021).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: total_poi_count
        description: Total POI count for this PLR in this snapshot year.
      - name: berlin_total_poi_count
        description: Sum of total_poi_count across all PLRs for this city and year.
      - name: plr_poi_share
        description: >
          This PLR's fraction of total Berlin POIs for this year:
          total_poi_count / berlin_total_poi_count. Ranges 0-1; city-wide sum = 1.0.

  - name: int_poi_share_base_2021
    description: >
      Remaps int_poi_share_base to a unified LOR 2021 PLR scheme for all snapshot years.
      Fixes issue #63: before this model, int_poi_status_dynamism read int_poi_share_base
      directly, causing the LAG window (partitioned by area_code + area_vintage) to produce
      NULL at snapshot_year=2021 because pre-2021 rows had different PLR codes and a
      different area_vintage value.

      Crosswalk strategy (mirrors int_berlin_ewr_plr2021):
      - lor_2021 rows (snapshot_year >= 2021): passed through unchanged.
      - lor_pre2021 rows (snapshot_year <= 2020): joined to seed_lor_crosswalk_2006_to_2021;
        total_poi_count (an extensive/count indicator) is apportioned as SUM(count * weight).

      All output rows use area_vintage='lor_2021'. berlin_total_poi_count and plr_poi_share
      are recomputed after aggregation (ratio recomputation is exact for counts).

      Consumed exclusively by int_poi_status_dynamism.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
          config:
            where: "area_code is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code in the LOR 2021 scheme (8-digit, zero-padded).
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage. Always 'lor_2021': pre-2021 source rows are crosswalk-mapped
          to 2021 PLR codes; 2021+ source rows pass through directly.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_2021"]
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, 2008-2026).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: total_poi_count
        description: >
          Aggregated total POI count for this 2021 PLR in this year.
          For lor_2021 passthrough rows: same as int_poi_share_base.
          For lor_pre2021 remapped rows: SUM(source_count * crosswalk_weight) across all
          pre-2021 PLRs that map to this 2021 PLR (exact for count/extensive data).
      - name: berlin_total_poi_count
        description: >
          Sum of total_poi_count across all 2021 PLRs for this city and year.
          City-wide total is invariant to PLR boundary remapping (same city, same POIs).
      - name: plr_poi_share
        description: >
          This 2021 PLR's fraction of total Berlin POIs for this year:
          total_poi_count / berlin_total_poi_count. Recomputed after aggregation.
          Ranges 0-1; city-wide sum per year = 1.0.

  - name: int_gentrification_ts
    description: >
      R-A1 re-grounded time-series panel (#64, B7 #117): combines D3 predictors (POI), D1/D2
      MSS social outcomes, and D4 EWR baseline covariate. Two branches UNIONed:

      Branch A — lor_2021 (editions 2021, 2023, 2025, 542 PLRs): MSS + int_poi_status_dynamism
      + int_ewr_socioeco. All in lor_2021 PLR coordinate system.

      Branch B — lor_pre2021 (editions 2015, 2017, 2019, ~447 PLRs, B7 #117): MSS +
      int_poi_status_dynamism_pre2021 + int_ewr_socioeco_pre2021. All in lor_pre2021 PLR
      coordinate system. Enables thesis-era H2/H3 lead-lag panel in int_mss_lead_lag.

      ADR-0008 architectural fix: the pre-R-A1 model averaged predictors and outcomes into
      a single gentrification_score (no theoretical grounding). R-A1 separates the dimensions:
        D1 = status_index (1=hoch … 4=sehr_niedrig) — social STATUS outcome
        D2 = dynamik_index (1=positiv, 2=stabil, 3=negativ) — social DIRECTION outcome
        D3 = status_score / dynamism_score (C5-corrected POI z-scores) — commercial PREDICTOR
        D4 = ewr_composite (5-indicator z-score mean) — demographic BASELINE COVARIATE

      D1 POLARITY: 1=hoch (low deprivation) … 4=sehr_niedrig (most deprived). INVERSE numeric
      vs 2018 thesis status_summe but SAME deprivation gradient. See SQL model for full note.

      Z-SCORE CROSS-VINTAGE NOTE (binding): lor_pre2021 and lor_2021 z-scores are computed
      within their respective PLR populations and are NOT directly comparable. Cross-vintage
      comparison is prohibited. int_mss_lead_lag enforces within-vintage lag via area_vintage.

      D4 BASELINE DISCIPLINE: D4 enters ONLY as a cross-sectional LEVEL. D4 changes are
      near-tautological outcome proxies (Döring & Ulbricht 2016) and are EXCLUDED.

      Uninhabited PLRs (gesamtindex IS NULL): retained with is_uninhabited=true but MUST be
      excluded from all regression, lead-lag, and metric computation (§7.1; R-A3 C3).

      legacy_gentrification_score: the pre-R-A1 formula kept for 2018 baseline comparison only.
      NOT for new analysis.

      Grain: (city_code, area_code, area_vintage, snapshot_year) per MSS edition.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - area_vintage
              - snapshot_year
          config:
            where: "area_code is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md): the
      # re-grounded panel is empty whenever MSS/POI/EWR are missing on a machine.
      - assert_not_empty:
          config:
            severity: error
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: >
          MSS edition year (biennial: 2013, 2015, 2017, 2019, 2021, 2023, 2025).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code (8-digit, zero-padded).
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR boundary vintage from stg_berlin_mss: 'lor_pre2021' (edition ≤2019)
          or 'lor_2021' (edition ≥2021). Follows the native MSS vintage.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: total_poi_count
        description: Total POI count for this PLR in this year (D3 density; C5 source).
      - name: share_yoy_change
        description: >
          C5 normalized: year-over-year change in PLR POI share (D3 dynamism face; §2.4).
          NULL for the first year per PLR/vintage.
      - name: status_score
        description: >
          D3 predictor: z-score of total_poi_count relative to all PLRs for that year.
          POI density face; PREDICTOR not outcome (R-A1; ADR-0008).
      - name: dynamism_score
        description: >
          D3 predictor: C5-corrected z-score of share_yoy_change. Commercial succession signal.
          PREDICTOR not outcome. C5 geo-DS sign-off: PASS (docs/epic-c/C5-geo-signoff.md).
      - name: status_index
        description: >
          D1 outcome: MSS Social Status ordinal class. 1=hoch (high status, low deprivation) …
          4=sehr_niedrig (lowest status, most deprived). NULL = uninhabited PLR.
          POLARITY: INVERSE numeric vs 2018 thesis status_summe; same deprivation gradient.
          Treat as ORDINAL — never metric-average (R-A3 C2; index-definition.md §3).
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
              config:
                where: "status_index is not null"
      - name: dynamik_index
        description: >
          D2 outcome: MSS Dynamik (social change direction) ordinal class.
          1=positiv (improving), 2=stabil, 3=negativ (worsening). NULL = uninhabited PLR.
          Already vulnerability-positive in numeric order (3=worsening=most vulnerable).
          Mapped from WFS di_n {1,3,5} → {1,2,3} in stg_berlin_mss.
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3]
              config:
                where: "dynamik_index is not null"
      - name: gesamtindex
        description: >
          MSS 12-group composite code (tens digit=status, units digit=Dynamik WFS code {1,3,5}).
          Valid codes: {11,13,15,21,23,25,31,33,35,41,43,45}. NULL = uninhabited PLR.
          Do NOT treat as a 12-level metric ordinal (index-definition.md §1.7).
      - name: mss_edition
        description: >
          MSS publication year (biennial: 2013, 2015, 2017, 2019, 2021, 2023, 2025).
          Identical to snapshot_year in this model; retained for explicit temporal alignment.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: is_uninhabited
        description: >
          True if this PLR is uninhabited (gesamtindex IS NULL in MSS; WFS sentinel −9999 → null).
          Uninhabited PLRs MUST be excluded from all regression, lead-lag, and metric computation
          (index-definition.md §7.1; R-A3 C3). Retained here for completeness (row count reporting).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: typology_stage
        description: >
          Typology stage derived from the D1×D2 MSS Status × Dynamik matrix (ADR-0008;
          index-definition.md §1.5). One of: 'stable-established', 'pre-gentrification',
          'pioneer-signal', 'active-gentrification', 'consolidation-pressure',
          'improving-vulnerable'. NULL for uninhabited PLRs.
          PLR-level aggregate — not an individual/building-level statement (G-2 guardrail).
          D-2 sign guard: upgrading stages require non-negativ Dynamik (dynamik_index IN (1,2))
          as a necessary condition; dynamik_index=3 can NEVER yield an upgrading stage.
        tests:
          - accepted_values:
              arguments:
                values:
                  - stable-established
                  - pre-gentrification
                  - pioneer-signal
                  - active-gentrification
                  - consolidation-pressure
                  - improving-vulnerable
              config:
                where: "typology_stage is not null"
      - name: ewr_composite
        description: >
          D4 baseline covariate: mean of 5 EWR indicator z-scores. Higher = more
          socio-economically vulnerable population. All inputs are vulnerability-positive.
          Enters the model ONLY as a cross-sectional LEVEL (§4.3, binding).
          NULL when any key indicator is suppressed or absent.
      - name: foreigners_share
        description: D4 component (foreigners share; vulnerability-positive baseline level).
      - name: age_under18_share
        description: D4 component (share of residents under 18; vulnerability-positive baseline).
      - name: migration_background_share
        description: >
          D4 component: share with migration background (vulnerability-positive; ≥2017 only
          due to Mikrozensus definition break — do not compare pre/post-2017; §4.4).
      - name: mean_age_years
        description: D4 component (mean age in years; vulnerability-positive; negation removed PR #89).
      - name: residence_duration_5y_share
        description: >
          D4 component: share resident ≤5 years (vulnerability-positive; high tenure = settled
          pre-gentrification population per Döring & Ulbricht 2016).
      - name: residents_total
        description: Total residents in this PLR for this year (from EWR; for population weighting).
      - name: legacy_gentrification_score
        description: >
          Pre-R-A1 formula kept for 2018 baseline comparison ONLY.
          = (status_score + dynamism_score - ewr_composite) / 3.0
          This formula averaged predictors and outcomes with no theoretical grounding.
          DO NOT use for new analysis. Refer to D1/D2 columns for outcome analysis
          and D3 columns for predictor analysis (R-A1; ADR-0008).

  - name: int_ewr_lead_lag
    description: >
      #114: EWR-based annual lead-lag panel for same-era H2/H3 thesis comparison.

      The E1 regressions test H2/H3 against the MSS 2021–2025 panel, but the 2018 thesis
      used EWR data at the 2014→2016 snapshot gap. This model provides the same-era,
      same-source comparison: annual EWR composite pairs at k=1, 2, and 4 year lags.

      Key difference from int_mss_lead_lag: ewr_composite is a metric z-score mean so
      delta_ewr is a valid arithmetic delta (OLS + Spearman both permitted), unlike the
      MSS ordinal status_index where metric differencing is prohibited (index-definition.md §3.3).

      Coverage: 2008–2020 (full composite 2014–2020; partial 3-indicator composite 2008–2013 via B9b).
      Vintage: lor_2021 throughout (pre-2021 EWR years crosswalked via int_berlin_ewr_plr2021).
      Thesis comparison window: k=2 (2014→2016) matches the thesis lead-lag gap exactly.

      Grain: one row per (area_code, area_vintage, year_t, lag_k).
      lag_k ∈ {1, 2, 4} — annual steps.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - area_vintage
              - year_t
              - lag_k
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "year_tk = year_t + lag_k"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "year_t >= 2008 AND year_t <= 2020"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "year_tk <= 2024"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "abs(delta_ewr - (ewr_composite_tk - ewr_composite_t)) < 1e-10"
      - assert_not_empty:
          config:
            severity: error
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null
      - name: area_code
        description: PLR area code (8-digit, zero-padded, lor_2021 vintage).
        tests:
          - not_null
      - name: area_vintage
        description: LOR boundary vintage. Always 'lor_2021' (all EWR years crosswalked).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["lor_2021"]
      - name: year_t
        description: Base year of the lead-lag pair.
        tests:
          - not_null
      - name: lag_k
        description: Lag in annual steps. One of 1, 2, or 4.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 4]
      - name: year_tk
        description: Outcome year (year_t + lag_k).
        tests:
          - not_null
      - name: ewr_composite_t
        description: EWR composite z-score at base year. Non-null by construction.
        tests:
          - not_null
      - name: ewr_composite_tk
        description: EWR composite z-score at outcome year. Non-null by construction.
        tests:
          - not_null
      - name: delta_ewr
        description: >
          Metric delta of ewr_composite (ewr_composite_tk - ewr_composite_t).
          Positive = population became MORE socio-economically vulnerable (status worsened).
          Negative = population became LESS vulnerable (status improved, gentrification).
          Valid for OLS and Spearman (z-score arithmetic difference).
        tests:
          - not_null
      - name: delta_ewr_t
        description: >
          Annual change in ewr_composite at base year vs prior year
          (ewr_composite_t - ewr_composite_{t-1}). Used as the H3b predictor side.
          NULL for the earliest available year per PLR.
      - name: residents_total_t
        description: Total residents at base year (uninhabited guard — always > 0).
        tests:
          - not_null
      - name: is_partial_composite_t
        description: >
          TRUE when the base year uses the 3-indicator partial composite (year_t <= 2013).
          Pre-2014 EWR lacks foreigners_share and migration_background_share (B9b).
      - name: is_partial_composite_tk
        description: >
          TRUE when the outcome year uses the 3-indicator partial composite (year_tk <= 2013).
      - name: any_endpoint_partial
        description: >
          TRUE if either the base or outcome year uses the partial composite.
          MUST be filtered to FALSE for any pooled H2/H3 regression -- partial and full
          composites are not cross-era comparable (see B9-domain-signoff.md).

  - name: int_mss_lead_lag
    description: >
      R-A1 lead-lag validation model (#64): primary analysis table for the thesis's temporal
      order finding. Tests whether POI commercial activity at t predicts MSS social status
      change at t+k (H3a, rejected in thesis) or vice versa (H3b, confirmed in thesis).

      Theory: Dangschat (1988) double invasion-succession cycle — social cycle LEADS commercial
      cycle. H3b confirmed / H3a rejected in thesis (p. 91, p. 55–56).

      Grain: one row per (city_code, area_code, area_vintage, edition_t, lag_k).
      lag_k ∈ {1, 2, 3} — MSS edition steps (each = 2 years; MSS is biennial).

      Exclusions applied:
        - is_uninhabited = true PLRs excluded from both base and lagged row (§7.1).
        - Cross-vintage deltas blocked: area_vintage must match between base and lagged row.
        - Only rows where the lagged outcome (status_index_tk) exists are retained.

      D4 discipline: ewr_composite_t is the ONLY D4 column (level at time t as baseline
      covariate). No D4 delta columns — D4 changes are near-tautological outcome proxies.

      C5 correction: dynamism_score (C5-corrected) is used throughout, never raw count deltas.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - area_vintage
              - edition_t
              - lag_k
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "delta_status_ordinal between -3 and 3"
          config:
            where: "delta_status_ordinal is not null"
      # Data-presence gate (docs/lessons/local-first-data-presence.md):
      - assert_not_empty:
          config:
            severity: error
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null
      - name: area_code
        description: PLR area code (8-digit, zero-padded).
        tests:
          - not_null
      - name: area_vintage
        description: >
          LOR boundary vintage. 'lor_pre2021' (editions ≤2019) or 'lor_2021' (editions ≥2021).
          Both base and lagged row must share the same vintage (vintage guard, binding).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
      - name: edition_t
        description: Base MSS edition year (time t; the predictor side).
        tests:
          - not_null
      - name: lag_k
        description: >
          MSS edition offset (1, 2, or 3 steps; each step = 2 years).
          edition_tk = edition_t + lag_k * 2.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
      - name: edition_tk
        description: Outcome MSS edition year (time t+k; edition_t + lag_k * 2).
        tests:
          - not_null
      - name: status_index_t
        description: >
          D1 MSS social status at time t (ordinal 1–4; 1=hoch best, 4=sehr_niedrig worst).
          Predictor side for H3a; baseline for H3b.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
      - name: dynamik_index_t
        description: >
          D2 MSS Dynamik at time t (ordinal 1–3; 1=positiv, 2=stabil, 3=negativ).
          Encodes the 2-year status change direction as a ready-made Δstatus proxy (thesis p. 97).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
      - name: typology_stage_t
        description: Typology stage at time t (from D1×D2 matrix; index-definition.md §1.5).
      - name: status_index_tk
        description: >
          D1 MSS social status at time t+k (outcome for H3a; ordinal 1–4).
          Only present rows where this exists (inner join on lag).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
      - name: dynamik_index_tk
        description: D2 MSS Dynamik at time t+k (outcome direction; ordinal 1–3).
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3]
              config:
                where: "dynamik_index_tk is not null"
      - name: delta_status_ordinal
        description: >
          status_index_tk - status_index_t. ORDINAL transition; do NOT treat as metric.
          Positive = status worsened (more deprived). Negative = status improved (less deprived).
          Range: -3 to +3 (bounded by the 4-class ordinal scale).
          D1 POLARITY: lower numeric = higher status = LESS deprived (INVERSE of thesis status_summe).
      - name: status_transition
        description: >
          Ordinal transition direction: 'improved' (status_index fell), 'stable' (unchanged),
          'worsened' (status_index rose). For use in ordered-logit / ordinal regression (§3.2).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["improved", "stable", "worsened"]
      - name: dynamism_score_t
        description: >
          D3 C5-corrected dynamism score at time t (z-score of share_yoy_change).
          Commercial succession signal; PREDICTOR for H3a (amenity at t → status at t+k).
      - name: delta_dynamism_t
        description: >
          Change in D3 dynamism_score at t vs t-1 (within-vintage LAG).
          Predictor for H3b: Δamenity_{t} vs Δstatus_{t+k} (§2.2; both sides must be deltas).
          C5-corrected; NULL for first MSS edition in vintage.
      - name: dynamism_score_tk
        description: >
          D3 C5-corrected dynamism score at time t+k.
          Outcome for H3b: Δstatus_{t} → Δamenity_{t+k} (Dangschat social-leads-commercial).
      - name: ewr_composite_t
        description: >
          D4 baseline vulnerability covariate at time t (cross-sectional LEVEL only; §4.3).
          Higher = more socio-economically vulnerable. NO D4 delta columns in this model.
      - name: is_pre2021_vintage
        description: >
          True if area_vintage = 'lor_pre2021' (the 447-PLR series; thesis universe; longest
          MSS time series). Epic B headline analysis uses this series (index-definition.md §6.2).

  - name: int_berlin_brw_plr
    description: >
      D3 (#29): Area-weighted spatial join of BRW land value zones → LOR 2021 PLR boundaries.
      Thesis §3.4: land value as structural rent-gap indicator.

      Method: ST_Intersects(brw_geom, plr_geom) as join predicate; weight = ST_Area(intersection)
      (the raw overlap area, not normalised); brw_weighted_avg_eur_m2 = SUM(value_eur_per_m2 *
      intersection_area_m2) / SUM(intersection_area_m2) — intensive-variable formula per geo-DS.
      Residential zones only: nutzung LIKE 'W%' (Wohngebiet variants WA, WR, WB, WS, etc.).
      Sliver guard: drop when overlap area < 1 m² AND fraction < 0.5% (AND semantics, geo cond 3).

      Always uses lor_2021 PLR geometries for temporal consistency across the 2017–2024 BRW series.
      snapshot_year derived from YEAR(brw.reference_date).

      Graceful degradation: returns zero rows when stg_berlin_bodenrichtwert or stg_berlin_lor
      return zero rows (no parquets ingested yet). Build passes before data is downloaded.

      Source: stg_berlin_bodenrichtwert + stg_berlin_lor. CRS: EPSG:25833 throughout.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
              - area_vintage
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "brw_weighted_avg_eur_m2 > 0"
          config:
            where: "brw_weighted_avg_eur_m2 is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "brw_residential_coverage_frac <= 1.05"
          config:
            where: "brw_residential_coverage_frac is not null"
            severity: warn
    columns:
      - name: city_code
        description: >
          City identifier (ADR-0005). Normalised to 'BER' by this model
          (stg_berlin_bodenrichtwert emits 'berlin'; normalised here for dim_city FK compatibility).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["BER"]
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: BRW reference year (integer, derived from YEAR(reference_date); 2017–2024).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code in LOR 2021 scheme (8-digit, zero-padded). FK -> stg_berlin_lor.
        tests:
          - not_null
      - name: area_vintage
        description: >
          LOR geometry vintage. Always 'lor_2021' (only lor_2021 PLR geometries are joined
          to provide a stable spatial reference across the full 2017–2024 BRW series).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_2021"]
              config:
                where: "area_code is not null"
      - name: brw_weighted_avg_eur_m2
        description: >
          Area-weighted mean Bodenrichtwert (EUR/m²) for this PLR in this year.
          Formula: SUM(value_eur_per_m2 * overlap_area) / SUM(overlap_area) — intensive
          variable formula (Openshaw 1984; mirrors int_berlin_ewr_plr2021 note).
          Residential zones only (nutzung LIKE 'W%'; BauNVO Wohngebiet variants).
          NULL if no residential BRW zones overlap this PLR for this year (pure park/water/
          industrial/airport PLR). Never 0 — zero EUR/m² is a false statement (geo cond 4).
      - name: n_brw_zones
        description: >
          Count of distinct residential BRW zones contributing to this PLR's weighted mean.
          Always >= 1 when brw_weighted_avg_eur_m2 is not null.
      - name: brw_residential_coverage_frac
        description: >
          Fraction of the PLR area covered by residential (nutzung LIKE 'W%') BRW zones:
          SUM(intersection_area_m2) / ST_Area(plr_geom) per PLR.
          Expected range: (0, 1]. Values > 1.0 indicate topological artefacts post-makevalid
          — flag in QA; do not treat > 1.0 as valid coverage. A warn-severity test guards this.
          NULL when no W% BRW zones overlap this PLR (pure park/water/industrial).
          Consumers: use to identify where the BRW signal is thin or absent. Zero-residential
          PLRs yield NULL brw_weighted_avg_eur_m2 and NULL here — transparent, not silently 0.
          (geo condition 4; index-definition §7 "exclude, don't zero-impute").

  - name: int_berlin_wohnlage_plr
    description: >
      D3 (#29): Wohnlage residential quality tier composition per PLR per WFS edition year.
      Thesis §3.4: Wohnlage residential quality tier composition per PLR — Mietspiegel basis.

      Method: ST_Within(wohnlage_point, plr_polygon) — point-in-polygon, same predicate as
      int_osm_poi_plr (geo-DS approved C3 method). Vintage alignment mirrors int_osm_poi_plr:
      vintage <= 2020 → lor_pre2021 geometries; vintage >= 2021 → lor_2021 geometries.
      pct_wohnlage = n_addresses / SUM(n_addresses) OVER (PARTITION BY vintage, area_code, area_vintage).

      Graceful degradation: returns zero rows when stg_berlin_wohnlage or stg_berlin_lor
      return zero rows (no parquets ingested yet). Build passes before data is downloaded.

      Source: stg_berlin_wohnlage + stg_berlin_lor. CRS: EPSG:25833 throughout.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - vintage
              - area_code
              - area_vintage
              - wohnlage
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "pct_wohnlage between 0 and 1"
          config:
            where: "pct_wohnlage is not null"
    columns:
      - name: city_code
        description: >
          City identifier (ADR-0005). Normalised to 'BER' by this model
          (stg_berlin_wohnlage emits 'berlin'; normalised here for dim_city FK compatibility).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["BER"]
              config:
                where: "area_code is not null"
      - name: vintage
        description: "WFS edition year (integer: 2017, 2019, 2021, 2023, 2026)."
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: "PLR area code. Vintage-specific (8-digit, zero-padded): lor_pre2021 or lor_2021 codes."
        tests:
          - not_null
      - name: area_vintage
        description: >
          LOR geometry vintage used for the spatial join.
          'lor_pre2021' for vintage <= 2020 (448 PLRs); 'lor_2021' for vintage >= 2021 (542 PLRs).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: wohnlage
        description: >
          Wohnlage residential quality tier (from WFS wol attribute).
          Values include 'einfach', 'mittel', 'gut' and their combinations.
          The exact tier vocabulary changes slightly across WFS vintages.
        tests:
          - not_null
      - name: n_addresses
        description: Count of Wohnlage-classified addresses in this PLR for this tier and vintage.
      - name: pct_wohnlage
        description: >
          Share of addresses in this Wohnlage tier within this PLR for this vintage year.
          pct_wohnlage = n_addresses / SUM(n_addresses) OVER (PARTITION BY vintage, area_code, area_vintage).
          Sums to 1.0 within each (vintage, area_code, area_vintage) group.
          Ranges from 0 to 1 inclusive.
      - name: wohnlage_low_n
        description: >
          Flag: TRUE when the PLR-vintage has fewer than 10 total Wohnlage address points
          (sum of n_addresses across all tiers for this PLR-vintage).
          Composition is computed but the share is statistically unstable with < 10 points.
          Downstream consumers (mart_price_rent_dimension) NULL the derived wohnlage_score
          and estimated rent for low-N PLR-vintages. Never zero-filled (geo condition 7).
          Low-N PLRs largely coincide with the BRW-NULL/uninhabited set — QA cross-check.

  - name: int_osm_poi_plr_weighted
    description: >
      A6 (#69): Distance-weighted PLR POI counts — Gaussian kernel variant.
      Applies a mass-conserving Gaussian decay kernel (spatial-methods.md §1-§2) to
      spread each POI's count across all PLRs within bandwidth b (default 500 m).

      Kernel: w_ij = exp(-d_ij² / (2·b²)) for d_ij ≤ b (else 0); d_ij = ST_Distance
      from POI point to PLR ST_PointOnSurface in EPSG:25833 (spatial-methods.md §3).
      Mass conservation: ŵ_ij = w_ij / Σ_i w_ij (spatial-methods.md §2).

      Bandwidth b = 500 m default (dbt var 'poi_kernel_bandwidth_m'); per-city parameter,
      never hard-coded (ADR-0005). MAUP sweep uses 250 m / 750 m variants via analysis/a6_maup.py.

      Output: one row per (city_code, snapshot_year, area_code, area_vintage, poi_category_h,
      poi_type_h, weight_variant) with weighted_count (fractional; sum = standard count
      city-wide); weight_variant discriminator (e.g. 'gaussian_500m'). Feeds the same share pipeline as int_poi_features_pivot
      for the distance-weighted dynamism_score used by Gi* hotspot analysis (spatial-methods.md §6).

      CRS: EPSG:25833 throughout (ADR-0010 Amendment 3; spatial-methods.md §3).
      Graceful degradation: zero-row typed stub when OSM/LOR data absent.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
              - area_vintage
              - poi_category_h
              - poi_type_h
              - weight_variant
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "weighted_count >= 0"
          config:
            where: "area_code is not null and weighted_count is not null"
    columns:
      - name: city_code
        description: City identifier (ADR-0005).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: Calendar year of the OSM snapshot (integer, 2008-2026).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code (8-digit, zero-padded). Vintage-specific.
        tests:
          - not_null:
              config:
                where: "snapshot_year is not null"
      - name: area_vintage
        description: >
          LOR scheme vintage: 'lor_pre2021' (snapshot_year <= 2020) or
          'lor_2021' (snapshot_year >= 2021).
        tests:
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: poi_domain_h
        description: Harmonized POI domain (from int_osm_poi_harmonized).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: poi_category_h
        description: Harmonized POI category (from int_osm_poi_harmonized).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: poi_type_h
        description: Harmonized POI type (from int_osm_poi_harmonized).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: weighted_count
        description: >
          Distance-weighted fractional POI count for this PLR, year, and category.
          Sum of ŵ_ij (normalized Gaussian kernel weights) over all POIs j of this
          category reaching PLR i within bandwidth b. City-wide sum equals total POI
          count (mass-conserving; spatial-methods.md §2).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: contributing_poi_count
        description: >
          Integer count of POIs contributing to this PLR's weighted_count (i.e. POIs
          within bandwidth b). Always >= 1 when weighted_count > 0.
      - name: weight_variant
        description: >
          Kernel variant discriminator for MAUP sensitivity comparison (spatial-methods.md §7).
          Default: 'gaussian_500m' (b=500 m). Sweep variants: 'gaussian_250m', 'gaussian_750m'.
          Compare against 'standard' (hard point-in-polygon from int_osm_poi_plr).
        tests:
          - not_null:
              config:
                where: "area_code is not null"

  - name: int_mss_bzr_aggregate
    description: >
      B10 (#120): BZR (Bezirksregion) and Bezirk spatial aggregation of MSS, EWR, and POI
      data. Rolls up PLR-level data from int_gentrification_ts to BZR (~138-143 units) and
      Bezirk (~12 units) using population-weighted means.

      BZR code = first 6 chars of 8-digit PLR area_code.
      Bezirk code = first 2 chars of 8-digit PLR area_code ('01'-'12').

      For lor_pre2021, BZR codes (6 chars) match the 2018 thesis BZR raum_ids exactly
      (all 137 thesis BZR codes verified 2026-06-30).

      Status_index and dynamik_index: population-weighted mean rounded to nearest ordinal.
      POI counts: summed across constituent PLRs (extensive).
      EWR composites and shares: population-weighted averages (intensive).
      Typology: derived from aggregated status_index x dynamik_index (D1xD2 matrix, ADR-0008).

      Output grain: (city_code, area_code, area_vintage, area_level, snapshot_year).
      area_level: 'bzr' or 'bezirk'.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_level
              - area_code
              - area_vintage
              - snapshot_year
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null
      - name: area_level
        description: Area level. Values 'bzr' or 'bezirk'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bzr", "bezirk"]
      - name: area_code
        description: Area code — 6-char BZR code or 2-char Bezirk code.
        tests:
          - not_null
      - name: area_vintage
        description: LOR boundary vintage ('lor_pre2021' or 'lor_2021').
        tests:
          - not_null
      - name: snapshot_year
        description: MSS edition year (2013, 2015, 2017, 2019, 2021, 2023, 2025).
        tests:
          - not_null
      - name: status_index
        description: >
          Population-weighted mean of constituent PLR status_index values, rounded to
          nearest ordinal (1=hoch/best … 4=sehr_niedrig/worst). Clamped to [1, 4].
          INVERSE numeric vs 2018 thesis status_summe (same deprivation gradient).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
      - name: dynamik_index
        description: >
          Population-weighted mean of constituent PLR dynamik_index values, rounded to
          nearest ordinal (1=positiv/improving … 3=negativ/worsening). Clamped to [1, 3].
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
      - name: n_plr
        description: Number of constituent PLRs contributing to this rollup.
        tests:
          - not_null
      - name: typology_stage
        description: >
          Indicative coarsened typology — derived from floored mean-of-ordinals status/dynamik.
          NOT the official Senate BZR typology. For MAUP diagnostic use only; must not be fed
          into gentrification_index mart or published as per-area verdicts (B10 domain sign-off Condition 4).
