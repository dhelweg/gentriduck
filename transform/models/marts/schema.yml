version: 2

models:
  - name: gentrification_index
    description: >
      Governed gentrification index mart (ADR-0004). One row per
      (city_code, area_level, area_code, period_yyyymm, variant).
      This is the core output of the Gentriduck warehouse; its schema
      is governed by ADR-0004 and stable -- changes require a deliberate
      contract edit.

      Current state (Epic B baseline): sourced from the 2018 thesis goldens
      via int_thesis_2018_area_index. When Epic B3/C re-computes the index
      from fresh OSM/EWR inputs, the upstream intermediate model is updated
      and this mart rebuilds without schema changes.

      All class labels use English values (translated at the staging boundary).
      Label polarity note: status_class 'low' = low deprivation / wealthier area;
      dynamism_class 'negative' = high gentrification pressure. See B5-findings-check.md.

      Index definition reference: docs/adr/0004-data-governance-and-index-definition.md
    meta:
      dbt_meta_owner: data-engineer
      governed_definition: ADR-0004
    config:
      contract:
        enforced: true
    columns:
      - name: city_code
        description: City identifier (FK -> dim_city). ADR-0005 seam.
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
          - relationships:
              arguments:
                to: ref('dim_city')
                field: city_code
      - name: area_level
        description: Area level identifier from the conformed taxonomy.
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bezirk", "bzr", "plr"]
      - name: area_code
        description: Area code. Part of the natural key.
        data_type: varchar
        tests:
          - not_null
      - name: area_name
        description: Area name (German proper noun; Berlin place names).
        data_type: varchar
        tests:
          - not_null
      - name: period_yyyymm
        description: Reporting period as string YYYYMM (e.g. '201612').
        data_type: varchar
        tests:
          - not_null
      - name: variant
        description: >
          Index variant. 'standard' uses non-distance-weighted POI features;
          'distance_weighted' uses POI inverse-distance weighting;
          'live_data' uses the C4 time-series pipeline (OSM + EWR, all years).
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["standard", "distance_weighted", "live_data"]
      - name: population
        description: Area population (Einwohner) at the reporting period.
        data_type: double
      - name: status_index
        description: >
          R-A1 update (#64): for live_data variant, now carries D1 MSS Social Status ordinal
          (cast to DOUBLE: 1.0=hoch/best … 4.0=sehr_niedrig/worst; NULL=uninhabited PLR).
          For thesis variants (standard/distance_weighted): z-score of POI-based status features
          (original 2018 definition unchanged).
          POLARITY of live_data values: INVERSE numeric vs 2018 thesis status_summe; same
          deprivation gradient. Cross-variant comparison requires explicit D1 flip (index §5).
        data_type: double
      - name: status_class
        description: >
          R-A1 update (#64): for live_data variant, now carries the typology stage name from
          the D1×D2 MSS Status × Dynamik matrix (ADR-0008; index-definition.md §1.5).
          Values: 'stable-established', 'pre-gentrification', 'pioneer-signal',
          'active-gentrification', 'consolidation-pressure', 'improving-vulnerable'.
          NULL for uninhabited PLRs (is_uninhabited=true).
          For thesis variants: original projected status class (three values; unchanged).
          PLR-level aggregate; not an individual/building-level statement (G-2 guardrail;
          ecological-inference disclaimer: index-definition.md §1.2).
        data_type: varchar
      - name: status_class_bi
        description: Binary projected status class (high/medium/low English labels).
          NULL for live_data variant rows (classification not yet implemented).
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
              config:
                where: "status_class_bi is not null"
      - name: dynamism_index
        description: >
          R-A1 update (#64): for live_data variant, now carries D2 MSS Dynamik ordinal
          (cast to DOUBLE: 1.0=positiv/improving … 3.0=negativ/worsening; NULL=uninhabited PLR).
          For thesis variants (standard/distance_weighted): z-score of POI-based dynamism features.
          D2 is already vulnerability-positive in numeric order (3=worsening=most vulnerable).
        data_type: double
      - name: dynamism_class
        description: >
          Projected dynamism class (three values; positive/neutral/negative).
          Polarity note: 'negative' = high gentrification pressure / above-average POI churn.
          'positive' = low gentrification pressure / below-average POI churn.
          See B5-findings-check.md for full explanation.
        data_type: varchar
      - name: dynamism_class_bi
        description: Binary projected dynamism class (positive/neutral/negative English labels).
          NULL for live_data variant rows (classification not yet implemented).
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ["positive", "neutral", "negative"]
              config:
                where: "dynamism_class_bi is not null"
      - name: own_idx_class
        description: Own index class (3 buckets; socio-economic EWR-based index; positive/neutral/negative).
        data_type: varchar
      - name: own_idx_class_bi
        description: Binary own index class (positive/neutral/negative English labels).
        data_type: varchar
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_level
              - area_code
              - period_yyyymm
              - variant


  - name: fct_gentrification_change
    description: >
      C4 mart: per-PLR per-year gentrification change metrics.
      R-A1 update (#64): adds D1/D2 MSS outcome columns (status_index, dynamik_index,
      typology_stage) and ordinal status transition (status_index_prev, status_transition).

      Output grain: (city_code, area_code, area_vintage, snapshot_year).
      LAG computations are within (city_code, area_code, area_vintage) to avoid
      cross-vintage comparisons at the 2021 LOR boundary.
      Uninhabited PLRs (is_uninhabited=true) are retained; status/transition columns NULL.

      gentrification_score (legacy): the pre-R-A1 formula kept for 2018 baseline comparison.
      = (status_score + dynamism_score - ewr_composite) / 3.0. NOT for new analysis.
      Use status_index / dynamik_index / typology_stage for outcome analysis (R-A1; ADR-0008).

      C5 update (2026-06-19): dynamism_score is z-score of share_yoy_change (PLR POI share
      delta; C5 OSM completeness-bias correction). See docs/epic-c/C5-geo-signoff.md.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - area_vintage
              - snapshot_year
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        tests:
          - not_null
      - name: snapshot_year
        description: >
          MSS edition year (biennial: 2013, 2015, 2017, 2019, 2021, 2023, 2025).
        tests:
          - not_null
      - name: area_code
        description: PLR area code (8-digit, zero-padded).
        tests:
          - not_null
      - name: area_vintage
        description: LOR vintage ('lor_pre2021' or 'lor_2021').
        tests:
          - not_null
      - name: mss_edition
        description: MSS publication year (same as snapshot_year; retained for explicit tracking).
      - name: total_poi_count
        description: Total POI count for this PLR in this year (D3 density predictor).
      - name: share_yoy_change
        description: >
          C5 normalized: year-over-year change in PLR POI share (D3 dynamism face).
          NULL for first year of each vintage. Positive = PLR gained share relative to Berlin.
      - name: status_score
        description: >
          D3 predictor: z-score of total_poi_count (POI density face). NOT a social outcome.
      - name: dynamism_score
        description: >
          D3 predictor: C5-corrected z-score of share_yoy_change. Commercial succession signal.
          NOT a social outcome. C5 geo-DS sign-off: PASS (docs/epic-c/C5-geo-signoff.md).
      - name: ewr_composite
        description: D4 baseline covariate (mean of 5 EWR z-scores; higher = more vulnerable).
      - name: foreigners_share
        description: D4 component (foreigners share; vulnerability-positive baseline level).
      - name: migration_background_share
        description: D4 component (migration background share; vulnerability-positive; ≥2017 only).
      - name: mean_age_years
        description: D4 component (mean age; vulnerability-positive; negation removed PR #89).
      - name: residence_duration_5y_share
        description: D4 component (≤5yr tenure share; vulnerability-positive; Döring-Ulbricht 2016).
      - name: residents_total
        description: Total residents for population weighting (from EWR).
      - name: status_index
        description: >
          D1 outcome: MSS social status ordinal (1=hoch/best … 4=sehr_niedrig/worst).
          NULL = uninhabited PLR. INVERSE numeric vs 2018 thesis; same deprivation gradient.
          Treat as ORDINAL; never metric-average (R-A3 C2; index-definition.md §3).
      - name: dynamik_index
        description: >
          D2 outcome: MSS Dynamik (1=positiv/improving, 2=stabil, 3=negativ/worsening).
          NULL = uninhabited PLR. Already vulnerability-positive in numeric order.
      - name: typology_stage
        description: >
          Typology stage from D1×D2 matrix (ADR-0008; index-definition.md §1.5).
          NULL = uninhabited PLR. One of: 'stable-established', 'pre-gentrification',
          'pioneer-signal', 'active-gentrification', 'consolidation-pressure', 'improving-vulnerable'.
          PLR-level aggregate; not an individual/building-level statement (G-2 guardrail).
      - name: is_uninhabited
        description: True if PLR is uninhabited (gesamtindex IS NULL in MSS; §7.1).
      - name: gesamtindex
        description: MSS 12-group composite code. NULL = uninhabited PLR.
      - name: status_index_prev
        description: >
          D1 status_index at the prior MSS edition (LAG within area + vintage).
          NULL for the first edition in each vintage or uninhabited PLR.
          Used to compute status_transition.
      - name: status_transition
        description: >
          Ordinal status transition: 'improved' (status_index fell = less deprived),
          'stable' (unchanged), 'worsened' (status_index rose = more deprived).
          NULL for first edition in vintage or when either status_index is NULL.
          D1 POLARITY: lower numeric = higher status. 'improved' = status numerically decreased.
          Use ordered logit for regression (R-A3 C2; §3.2); never treat delta as metric.
        tests:
          - accepted_values:
              arguments:
                values: ["improved", "stable", "worsened"]
              config:
                where: "status_transition is not null"
      - name: gentrification_score
        description: >
          LEGACY formula alias (pre-R-A1): = (status_score + dynamism_score - ewr_composite) / 3.0.
          Kept for 2018 baseline comparison ONLY. NOT for new analysis.
          Use status_index / dynamik_index / typology_stage for outcome analysis (R-A1; ADR-0008).
      - name: gentrification_score_prev
        description: gentrification_score (legacy) from the prior edition. NULL for first edition.
      - name: gentrification_delta
        description: gentrification_score minus gentrification_score_prev (legacy; for 2018 comparison).
      - name: rank_current
        description: Rank of this PLR by legacy gentrification_score within city x year (1=highest).
      - name: rank_prev
        description: Legacy rank from the prior edition. NULL for first edition.
      - name: rank_change
        description: rank_prev minus rank_current (positive means improved rank; legacy metric).

  - name: fct_poi_development
    description: >
      C3-fact -- POI development fact table. Aggregates OSM POI counts per
      (city_code, snapshot_year, area_code, area_vintage, poi_category_h) at PLR grain.
      Source: int_osm_poi_plr (C3 spatial join). Excludes rows where area_code IS NULL
      (POIs outside PLR boundaries). One row per unique combination of the five
      grouping dimensions; poi_count is the count of POIs in that cell.
      Materialised as table (aggregation over spatial join result).
    meta:
      dbt_meta_owner: data-engineer
    columns:
      - name: city_code
        description: City identifier (ADR-0005).
        tests:
          - not_null
      - name: snapshot_year
        description: Calendar year of the OSM snapshot.
        tests:
          - not_null
      - name: area_code
        description: PLR area code (8-digit, zero-padded). Never NULL (NULL rows excluded upstream).
        tests:
          - not_null
      - name: area_vintage
        description: >
          Spatial-join vintage. 'lor_pre2021'/'lor_2021' for Berlin LOR; 'current'
          for Hamburg statistische Gebiete (single live-WFS edition, ADR-0014
          Pillar 1 — no historical vintage crosswalk yet).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021", "current"]
      - name: poi_category_h
        description: Harmonized POI category.
        tests:
          - not_null
      - name: poi_count
        description: Count of POIs in this (city, year, area, vintage, category) cell.
        tests:
          - not_null
      - name: source_attribution
        description: CC BY attribution string (ODbL -- OpenStreetMap contributors).
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
              - area_vintage
              - poi_category_h
          config:
            where: "area_code is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "poi_count > 0"


  - name: fct_gentrification_trajectory
    description: >
      R-A8 (#78): Longitudinal trajectory & stage model (2013–2025).
      Classifies each PLR's social-status trajectory across the full MSS time series
      (editions: 2013, 2015, 2017, 2019, 2021, 2023, 2025) into one of five trajectory
      types aligned with Dangschat's (1988) double invasion-succession cycle.

      Output grain: (city_code, area_code, area_vintage) — one trajectory summary per
      PLR per LOR vintage. Inhabited PLRs only (is_uninhabited=false).

      LOR vintage handling: trajectories are computed within EACH VINTAGE SEPARATELY
      to avoid cross-vintage boundary errors at the 2021 LOR reform.
        - lor_pre2021: editions 2013, 2015, 2017, 2019 (up to 4 observations)
        - lor_2021: editions 2021, 2023, 2025 (up to 3 observations)

      Trajectory types (Dangschat 1988; Döring & Ulbricht 2016):
        stable-established    — low deprivation throughout the panel
        persistently-deprived — high deprivation throughout the panel
        improving             — status_index decreased by ≥1 step (less deprived over time)
        declining             — status_index increased by ≥1 step (more deprived over time)
        mixed                 — no clear dominant trend or insufficient observations

      Method citation: Dangschat (1988) double invasion-succession cycle;
      thesis §3.2 (Gentrifizierung als Prozess); ADR-0008 (R-A7 #77) D1 outcome.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - area_code
              - area_vintage
    columns:
      - name: city_code
        description: City identifier (ADR-0005). Always 'BER'.
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["BER"]
      - name: area_code
        description: PLR area code (LOR 2021 or pre-2021 vintage).
        data_type: varchar
        tests:
          - not_null
      - name: area_vintage
        description: LOR vintage identifier ('lor_pre2021' or 'lor_2021').
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
      - name: n_editions
        description: Number of MSS editions available for this PLR within this vintage.
        data_type: bigint
        tests:
          - not_null
      - name: first_edition
        description: First MSS edition year in this PLR's trajectory (within vintage).
        data_type: bigint
      - name: last_edition
        description: Last MSS edition year in this PLR's trajectory (within vintage).
        data_type: bigint
      - name: status_index_first
        description: D1 status_index at the first edition within this vintage.
        data_type: double
      - name: status_index_last
        description: D1 status_index at the last edition within this vintage.
        data_type: double
      - name: status_index_min
        description: Minimum D1 status_index across editions (best status = 1).
        data_type: double
      - name: status_index_max
        description: Maximum D1 status_index across editions (worst status = 4).
        data_type: double
      - name: status_index_mean
        description: Mean D1 status_index across editions (vulnerability-positive; higher = more deprived).
        data_type: double
      - name: status_delta
        description: >
          Change in D1 status_index from first to last edition within this vintage.
          Positive = worsened (more deprived); negative = improved (less deprived).
          Zero = stable across the panel. Only meaningful if n_editions > 1.
        data_type: double
      - name: status_range
        description: Within-panel range of status_index (max - min). Measures trajectory volatility.
        data_type: double
      - name: trajectory_type
        description: >
          Trajectory classification (R-A8; Dangschat 1988 framework).
          'stable-established'    — low deprivation throughout
          'persistently-deprived' — high deprivation throughout
          'improving'             — materially less deprived over time
          'declining'             — materially more deprived over time
          'mixed'                 — no clear dominant trend or < 2 editions
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - stable-established
                  - persistently-deprived
                  - improving
                  - declining
                  - mixed
      - name: dominant_stage
        description: Most frequent typology_stage (D1×D2 matrix) across editions within this vintage.
        data_type: varchar
      - name: n_editions_improving_stage
        description: Count of editions where the typology_stage is an improving-type stage.
        data_type: bigint
      - name: n_editions_sehr_niedrig
        description: Count of editions where status_index = 4 (sehr_niedrig = most deprived).
        data_type: bigint
      - name: n_editions_hoch
        description: Count of editions where status_index = 1 (hoch = least deprived).
        data_type: bigint
      - name: trajectory_confidence
        description: >
          Confidence level for the trajectory classification.
          'high'   — n_editions >= 3 and non-mixed trajectory
          'medium' — n_editions == 2 and non-mixed trajectory
          'low'    — mixed trajectory type or n_editions <= 1
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
      - name: is_persistently_vulnerable
        description: >
          True if the mean D1 status_index across editions >= 3.0 (predominantly
          niedrig or sehr_niedrig deprivation levels throughout the panel).
          Useful for cross-validation against R-B2 hotspot labels.
        data_type: boolean
        tests:
          - not_null
      - name: is_persistently_affluent
        description: >
          True if the mean D1 status_index across editions <= 1.5 (predominantly
          hoch deprivation level throughout the panel).
          Useful for cross-validation against R-B2 coldspot labels.
        data_type: boolean
        tests:
          - not_null

  - name: mart_price_rent_dimension
    description: >
      D3 (#29): Price/rent dimension mart — structural LEVEL context for each PLR
      per vintage year. Combines three signals:
        (1) BRW area-weighted land value (from int_berlin_brw_plr)
        (2) Wohnlage tier composition (from int_berlin_wohnlage_plr, pivoted)
        (3) Modelled Mietspiegel rent estimate (Wohnlage-composition-weighted over a
            fixed reference dwelling profile: 60–90 m², 1950–1964 construction year)

      STRUCTURAL LEVEL, NOT DYNAMIC SIGNAL (geo condition 14, domain D2, ADR-0008):
      All signals here are BASELINE/CONTEXT COVARIATES (D4-levels pattern,
      index-definition §4.6). They must NOT be blended into the MSS Status×Dynamik
      typology — that would reproduce the ADR-0008 legacy-averaging error.

      BRW polarity (ambiguous, domain D2): high land value = price-surface / consolidation
      CONTEXT COVARIATE — ambiguous between historic wealth, completed gentrification, and
      active pressure. Sign-flip required if pooled into vulnerability composite.
      DISPLACEMENT-RISK language attaches only to BRW CHANGE (brw_trend), not the level.

      Wohnlage polarity (domain D3): high pct_einfach = vulnerability/headroom PRECONDITION.
      High wohnlage_score = desirable = consolidated = LOW residual headroom; sign-flip for
      vulnerability composite. The Aufwertung OUTCOME is declining einfach share over vintages
      (built separately as a change indicator).

      Modelled rent (domain D6, D7): "modelled/estimated net cold rent at a fixed reference
      dwelling profile — NOT observed rent paid." Bestandsmiete/ortsübliche Vergleichsmiete
      (Holm 2010); lagging, conservative; understates leading-edge displacement pressure.

      Normalization: winsorized (1%/99%) z-scores per (city_code, snapshot_year) over
      non-NULL, non-low-n PLRs. Rank/percentile of BRW value added (rank is the headline
      for heavy-tailed land values; z-score secondary). OECD/JRC (2008) common polarity.

      Ecological fallacy guardrail (domain D10, G-2): PLR-LEVEL aggregates only.
      BRW is coarser than PLR (1,621 zones, area-interpolated) — NOT parcel precision.
      Inferring an individual's rent/land-value/displacement from a PLR value is fallacious.

      Milieuschutz/counter-misuse framing (domain D12): frame toward identifying quarters
      that may warrant displacement protection (Holm 2010, Bernt 2016). NOT an investment
      surface. Low land value + vulnerable population = flag for PROTECTION, not invitation.

      R-C2 citations: Smith (1979) rent gap; Blasius & Dangschat (1990) Aufwertung;
      Holm (2010) / Bernt (2016) Milieuschutz; Openshaw (1984) MAUP; OECD/JRC (2008).
      Sign-offs: docs/epic-d/d3-price-rent-geo-signoff.md,
                 docs/epic-d/d3-price-rent-domain-signoff.md.

      Graceful degradation: returns zero rows when intermediate models return zero rows.
    meta:
      dbt_meta_owner: data-engineer
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city_code
              - snapshot_year
              - area_code
              - area_vintage
          config:
            where: "area_code is not null"
    columns:
      - name: city_code
        description: >
          City identifier (ADR-0005). Always 'BER' — normalised by int_berlin_brw_plr and
          int_berlin_wohnlage_plr (staging layers emit 'berlin'; normalised for dim_city FK).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["BER"]
              config:
                where: "area_code is not null"
      - name: snapshot_year
        description: >
          Price/rent dimension vintage year (integer).
          For BRW-only rows: derived from YEAR(brw.reference_date), 2017–2024.
          For Wohnlage-only rows (e.g. 2026): Wohnlage WFS edition year.
        tests:
          - not_null:
              config:
                where: "area_code is not null"
      - name: area_code
        description: PLR area code (8-digit, zero-padded). LOR 2021 scheme for BRW; vintage-specific for Wohnlage.
        tests:
          - not_null
      - name: area_vintage
        description: >
          LOR boundary vintage. 'lor_2021' for BRW rows (always lor_2021 in int_berlin_brw_plr).
          'lor_pre2021' or 'lor_2021' for Wohnlage rows (vintage-specific join).
        tests:
          - not_null:
              config:
                where: "area_code is not null"
          - accepted_values:
              arguments:
                values: ["lor_pre2021", "lor_2021"]
              config:
                where: "area_code is not null"
      - name: brw_weighted_avg_eur_m2
        description: >
          Area-weighted mean Bodenrichtwert (EUR/m²) for residential BRW zones overlapping
          this PLR. NULL for non-residential/uninhabited PLRs (pure park/water/airport).
          POLARITY: ambiguous context covariate (domain D2). High = price-surface/consolidation.
          Sign-flip required for vulnerability composite. NOT a vulnerability score.
          BRW LEVEL ≠ rent gap (Smith 1979) — the rent gap is a difference, not a level (domain D1).
      - name: n_brw_zones
        description: Count of distinct residential BRW zones contributing to brw_weighted_avg_eur_m2.
      - name: brw_residential_coverage_frac
        description: >
          Fraction of the PLR area covered by residential BRW zones (0–1).
          NULL when no W% BRW zones overlap this PLR. Use to identify thin-signal PLRs.
      - name: pct_einfach
        description: >
          Share of Wohnlage-classified addresses in the 'einfach' (simple/basic) tier for
          this PLR-vintage. 0.0 if this tier is absent; NULL if no Wohnlage data available.
          POLARITY: vulnerability-positive (high pct_einfach = more upgrading headroom;
          inner-city precondition for gentrification per Blasius & Dangschat 1990; domain D3).
      - name: pct_mittel
        description: Share of addresses in the 'mittel' (medium) Wohnlage tier. 0.0 if absent.
      - name: pct_gut
        description: Share of addresses in the 'gut' (good/desirable) Wohnlage tier. 0.0 if absent.
      - name: wohnlage_n_addresses
        description: Total count of Wohnlage-classified address points in this PLR-vintage across all tiers.
      - name: wohnlage_low_n
        description: >
          TRUE when this PLR-vintage has fewer than 10 total Wohnlage address points.
          When TRUE: wohnlage_score, est_rent_mid/low/high, wohnlage_zscore, est_rent_zscore
          are all NULL (unstable composition; geo condition 7).
      - name: wohnlage_score
        description: >
          Ordinal-mean approximation of Wohnlage quality per PLR:
          pct_einfach * 1 + pct_mittel * 2 + pct_gut * 3.
          Range: [1.0, 3.0]. LABELLED AS ORDINAL-MEAN APPROXIMATION — the three tiers are
          ordered but not equidistant; do not treat as interval-scaled in regression without noting.
          NULL when wohnlage_low_n = TRUE.
          POLARITY: high score = more desirable = consolidated = LOW residual headroom.
          Sign-flip required for vulnerability composite (for vulnerability framing, use pct_einfach).
      - name: est_rent_mid
        description: >
          Modelled/estimated net cold rent (EUR/m²/month) at the fixed reference dwelling profile:
          size = 60–90 m², construction year = 1950–1964, standard equipment (mit SH/Bad/IWC).
          Formula: pct_einfach * ms_einfach_mid + pct_mittel * ms_mittel_mid + pct_gut * ms_gut_mid
          using the Mietspiegel rent_mid values for the nearest-<= vintage.
          "modelled/estimated net cold rent at a fixed reference dwelling profile — NOT observed
           rent paid." (domain D6; Mietspiegel ortsübliche Vergleichsmiete; Holm 2010.)
          Bestandsmiete/lagging bias: conservative, understates leading-edge rent pressure (domain D7).
          NULL when wohnlage_low_n = TRUE (geo condition 7).
          POLARITY: affordability-negative (high = less affordable; Bestandsmiete-lagging).
      - name: est_rent_low
        description: >
          Composition-weighted lower bound (3/4-Spanne) of Mietspiegel reference rent.
          Same formula and fixed profile as est_rent_mid, using rent_low.
          NULL when wohnlage_low_n = TRUE.
      - name: est_rent_high
        description: >
          Composition-weighted upper bound (3/4-Spanne) of Mietspiegel reference rent.
          Same formula and fixed profile as est_rent_mid, using rent_high.
          NULL when wohnlage_low_n = TRUE.
      - name: mietspiegel_vintage_used
        description: >
          Mietspiegel edition year used for the modelled rent estimate.
          Nearest-<= match to the Wohnlage vintage year (geo condition 8).
          Approximation disclosure (domain D13): 2026 Wohnlage uses 2026 Mietspiegel
          (stands in for the 2025 MSS panel edition; disclose on G2).
      - name: wohnlage_vintage_matched
        description: >
          The Wohnlage vintage year that was joined to this BRW snapshot_year.
          Nearest-<= Wohnlage vintage for the BRW year. NULL for BRW years before the
          first available Wohnlage vintage. Same as snapshot_year for Wohnlage-only rows.
      - name: brw_zscore
        description: >
          Winsorized (1%/99%) z-score of brw_weighted_avg_eur_m2 per (city_code, snapshot_year),
          computed over non-NULL, non-low-n PLRs only.
          POLARITY: ambiguous (see brw_weighted_avg_eur_m2). Sign-flip if pooled into vulnerability.
          NULL when brw_weighted_avg_eur_m2 is NULL or normalization moments unavailable.
          (geo condition 13; OECD/JRC 2008)
      - name: wohnlage_zscore
        description: >
          Winsorized (1%/99%) z-score of wohnlage_score per (city_code, snapshot_year),
          computed over non-NULL, non-low-n PLRs only.
          POLARITY: high = desirable = consolidated = LOW vulnerability headroom.
          Sign-flip required for vulnerability composite; use pct_einfach for vuln framing.
          NULL when wohnlage_score is NULL or normalization moments unavailable.
          (geo condition 13; OECD/JRC 2008)
      - name: est_rent_zscore
        description: >
          Winsorized (1%/99%) z-score of est_rent_mid per (city_code, snapshot_year),
          computed over non-NULL, non-low-n PLRs only.
          POLARITY: affordability-negative (high = less affordable = more pressure).
          NULL when est_rent_mid is NULL or normalization moments unavailable.
          (geo condition 13; OECD/JRC 2008)
      - name: brw_rank
        description: >
          Rank of this PLR by brw_weighted_avg_eur_m2 within (city_code, snapshot_year),
          ascending (1 = lowest land value; higher rank = higher land value).
          NULL PLRs sorted last. Headline display metric for heavy-tailed land values (G2 page)
          because rank is outlier-insensitive (a few super-prime PLRs skew the z-score).
          (geo condition 13)
      - name: brw_percentile
        description: >
          PERCENT_RANK of brw_weighted_avg_eur_m2 within (city_code, snapshot_year),
          ascending. Range [0, 1]; 0 = lowest, 1 = highest land value.
          NULL PLRs sorted last.
          (geo condition 13)
