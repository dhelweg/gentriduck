name: "gentriduck"
version: "0.1.0"
profile: "gentriduck"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layered modelling: staging -> intermediate -> marts.
models:
  gentriduck:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table

seeds:
  gentriduck:
    +schema: seeds
    seed_lor_crosswalk_2006_to_2021:
      +column_types:
        # PLR codes are zero-padded 8-digit strings; must not be read as INTEGER.
        plr_id_pre2021: varchar
        plr_id_2021: varchar
        # Weights are fractional floats; CSV may use scientific notation (e.g. 9.286e-05).
        weight: double

# Test severity overrides for standalone SQL test files.
# C5 anomaly tests use warn severity: data quality alerts, not hard blockers.
tests:
  gentriduck:
    test_c5_poi_share_spike:
      +severity: warn
    test_c5_poi_count_drop:
      +severity: warn

# Project-level variables.
# project_root resolves the absolute repo root at build time via PWD, so
# staging models can call read_csv with an absolute path (cross-platform).
# Override via --vars 'project_root: /absolute/path' if PWD is not the repo root.
vars:
  project_root: "{{ env_var('PWD', '.') }}"
