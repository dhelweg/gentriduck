name: "gentriduck"
version: "0.1.0"
profile: "gentriduck"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layered modelling: staging -> intermediate -> marts.
models:
  gentriduck:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
